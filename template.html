<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<title>AI Engineer Melbourne 2026 — Schedule</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --line:#2b3340;
    --ink:#e6edf3; --muted:#8b98a9; --accent:#7c5cff; --star:#ffce47;
    --keynote:#f5a623; --hallway:#5cc8ff; --se:#4ade80; --lead:#ff6b9d; --ai:#a78bfa; --all:#fbbf24; --workshop:#f87171;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
  body{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
  a{color:var(--accent)}
  button{font-family:inherit}

  header.top{flex:none;padding:max(16px,env(safe-area-inset-top)) 18px 12px;border-bottom:1px solid var(--line);background:var(--bg);z-index:50}
  header.top h1{margin:0 0 3px;font-size:20px;letter-spacing:-.3px}
  header.top .sub{color:var(--muted);font-size:12.5px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:12px}
  .daytabs{display:flex;gap:6px}
  .daytabs button,.chip{cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:7px 13px;border-radius:999px;font-size:13px;white-space:nowrap}
  .daytabs button.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .trackfilters{display:flex;flex-wrap:wrap;gap:6px}
  .chip{display:inline-flex;align-items:center;gap:7px;user-select:none}
  .chip .dot{width:9px;height:9px;border-radius:50%;background:var(--c)}
  .chip.off{opacity:.36}
  .chip.starchip{border-color:var(--star)}
  .chip.starchip.on{background:var(--star);color:#1a1400;border-color:var(--star);font-weight:600}
  .chip.nopechip{border-color:#ff7b7b66}
  .chip.nopechip.on{background:#ff7b7b;color:#2a0000;border-color:#ff7b7b;font-weight:600}
  .search{margin-left:auto;display:flex;gap:8px;align-items:center}
  .search input{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:8px 11px;font-size:13px;width:210px}
  .legendnote{color:var(--muted);font-size:12px;white-space:nowrap}

  main{flex:1;min-height:0;padding:14px 18px;display:flex}

  /* ---------- desktop timeline grid ---------- */
  .gridwrap{flex:1;min-height:0;overflow:auto;border:1px solid var(--line);border-radius:12px;background:var(--panel);-webkit-overflow-scrolling:touch}
  .grid{display:grid;position:relative;min-width:max-content}
  .col-head{position:sticky;top:0;z-index:20;background:var(--panel2);border-bottom:1px solid var(--line);padding:11px 10px;font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px;white-space:nowrap}
  .col-head .dot{width:10px;height:10px;border-radius:50%;background:var(--c)}
  .timehead{position:sticky;left:0;z-index:30;background:var(--panel2);border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
  .timecol{position:sticky;left:0;z-index:15;background:var(--panel);border-right:1px solid var(--line)}
  .timelabel{position:absolute;right:8px;font-size:11px;color:var(--muted);transform:translateY(-50%);white-space:nowrap}
  .track-area{position:relative;border-right:1px solid var(--line)}
  .hourline{position:absolute;left:0;right:0;height:0;border-top:1px dashed #232b37;z-index:1}

  .session{position:absolute;left:5px;right:5px;border-radius:9px;padding:7px 9px;overflow:hidden;
            background:var(--panel2);border:1px solid var(--line);border-left:4px solid var(--c);
            box-shadow:0 1px 3px #0006;cursor:pointer;transition:transform .08s,box-shadow .08s}
  .session:hover{transform:translateY(-1px);box-shadow:0 4px 14px #0009;z-index:8;background:#222b3a}
  .session .t{font-weight:600;font-size:13px;line-height:1.25;margin:0 0 3px;padding-right:20px}
  .session .meta{font-size:11px;color:var(--muted);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .session .badge{font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;padding:1px 6px;border-radius:999px;background:#0006;border:1px solid var(--line);color:var(--muted)}
  .session .spk{font-size:11.5px;color:#c6d0dc;margin-top:3px;line-height:1.25}
  .session.tiny{padding:3px 9px}
  .session.tiny .t{font-size:11.5px;margin:0}
  .session.tiny .meta,.session.tiny .spk{display:none}
  .session.dim{opacity:.16;filter:grayscale(.6)}
  .session.hit{outline:2px solid var(--accent);outline-offset:0}
  .session.starred{border-color:var(--star);box-shadow:0 0 0 1px var(--star),0 2px 8px #0007;background:#262218}
  .session.nope{opacity:.4;filter:grayscale(.7)}
  .session.nope .t{text-decoration:line-through;text-decoration-color:#ff6b6b99}

  /* non-interactive status badge */
  .marks{position:absolute;top:5px;right:6px;font-size:14px;line-height:1;z-index:6;pointer-events:none}
  .marks.star{color:var(--star)}
  .marks.nope{color:#ff7b7b}

  .nowline{position:absolute;left:0;right:0;height:0;border-top:2px solid #ff4d4d;z-index:12;box-shadow:0 0 8px #ff4d4d}
  .nowline::before{content:"NOW";position:absolute;left:4px;top:-8px;font-size:9px;font-weight:700;color:#ff4d4d;background:var(--bg);padding:0 4px}

  /* ---------- mobile agenda list ---------- */
  .agenda{flex:1;min-height:0;overflow:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:0;width:100%}
  .timegroup{margin:0 0 4px}
  .timegroup h3{position:sticky;top:0;z-index:5;margin:0;padding:8px 2px 6px;font-size:13px;color:var(--muted);background:linear-gradient(180deg,var(--bg) 70%,transparent)}
  .lcard{position:relative;display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);border-left:4px solid var(--c);
          border-radius:11px;padding:11px 34px 11px 13px;margin:0 0 9px;cursor:pointer;color:inherit}
  .lcard:active{transform:scale(.995)}
  .lcard .t{font-weight:600;font-size:15px;line-height:1.3;margin:0 0 5px}
  .lcard .meta{font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  .lcard .badge{font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;padding:1px 6px;border-radius:999px;background:#0006;border:1px solid var(--line)}
  .lcard .tk{display:inline-flex;align-items:center;gap:5px}
  .lcard .tk .dot{width:8px;height:8px;border-radius:50%;background:var(--c)}
  .lcard .spk{font-size:12.5px;color:#c6d0dc;margin-top:5px}
  .lcard.starred{border-color:var(--star);box-shadow:0 0 0 1px var(--star);background:#262218}
  .lcard.nope{opacity:.45;filter:grayscale(.7)}
  .lcard.nope .t{text-decoration:line-through;text-decoration-color:#ff6b6b99}
  .lcard .marks{top:10px;right:12px;font-size:18px}
  .emptynote{color:var(--muted);text-align:center;padding:40px 0}

  /* modal */
  .modal{position:fixed;inset:0;background:#000b;display:none;align-items:flex-end;justify-content:center;z-index:200;padding:0}
  .modal.open{display:flex}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px 16px 0 0;max-width:560px;width:100%;max-height:88dvh;overflow:auto;padding:20px 22px calc(22px + env(safe-area-inset-bottom))}
  .card h2{margin:0 30px 6px 0;font-size:20px;line-height:1.25}
  .card .cmeta{color:var(--muted);font-size:13px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .card .badge{font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:999px;background:#0006;border:1px solid var(--line)}
  .card .desc{font-size:14.5px;line-height:1.55;color:#d4dce6;white-space:pre-wrap}
  .card .spklist{margin-top:16px;display:flex;flex-direction:column;gap:12px}
  .card .spkrow{display:flex;gap:11px;align-items:center}
  .card .spkrow img{width:46px;height:46px;border-radius:50%;object-fit:cover;background:#333;flex:none}
  .card .spkrow .nm{font-weight:600;font-size:14px}
  .card .spkrow .jt{font-size:12px;color:var(--muted)}
  .card .top-row{display:flex;gap:10px;align-items:center;margin-bottom:14px}
  .card .statuspill{flex:1;display:flex;align-items:center;gap:8px;padding:9px 13px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);font-size:13.5px;font-weight:600}
  .card .statuspill.star{background:#262218;color:var(--star);border-color:var(--star)}
  .card .statuspill.nope{color:#ff7b7b;border-color:#ff7b7b55}
  .card .close{cursor:pointer;border:none;background:var(--panel2);color:var(--ink);border-radius:10px;width:42px;height:42px;font-size:20px;flex:none}

  @media (min-width:761px){ .modal{align-items:center;padding:20px} .card{border-radius:16px} }
  @media (max-width:760px){
    main{padding:10px 12px}
    header.top{padding-left:12px;padding-right:12px}
    .search{margin-left:0;width:100%;order:5}
    .search input{flex:1;width:auto}
  }
</style>
</head>
<body>
<header class="top">
  <h1>AI Engineer Melbourne 2026</h1>
  <div class="sub">Building, deploying &amp; scaling AI in production · Melbourne · <a href="https://webdirections.org/ai-engineer/" target="_blank" rel="noopener">webdirections.org</a></div>
  <div class="controls">
    <div class="daytabs" id="daytabs"></div>
    <button class="chip starchip" id="staronly">★ Starred</button>
    <button class="chip nopechip" id="hidenope">⊘ Hide ruled-out</button>
    <div class="trackfilters" id="trackfilters"></div>
    <div class="search">
      <input id="search" type="search" placeholder="Search talks / speakers…" autocomplete="off">
      <span class="legendnote" id="count"></span>
    </div>
  </div>
</header>
<main id="main"></main>

<div class="modal" id="modal"><div class="card" id="card"></div></div>

<script id="DATA" type="application/json">__DATA__</script>
<script>
const DATA = JSON.parse(document.getElementById('DATA').textContent);
const TODAY = "2026-06-03";
const TRACK_COLORS = {
  "Keynote":"var(--keynote)","Hallway":"var(--hallway)","Software Engineering":"var(--se)",
  "Leadership":"var(--lead)","AI Engineering":"var(--ai)","All":"var(--all)","Workshop":"var(--workshop)"
};
const PXMIN = 1.7, HEAD_H = 46, MOBILE_BP = 760;
// Curated picks — edit these lists to change what's starred / ruled out for everyone.
const DEFAULT_STARS = [
  "6245259c-2daa-4e89-9d54-e6f890cdec95", // ADK pause/resume agents
  "6056e3a7-4bcf-403b-b85e-67abaa067001", // AI Hamsters
  "2d53e279-d883-4038-bc12-9b2594324b15", // Beyond Forgetful Bots
  "c6901280-f221-476f-bf2d-2525ea77f8ee", // Constitutional Prompting
  "8f1128aa-14a6-4d5e-9ef3-8e2788e15091"  // Multi-Armed Bandits (Ron Au, Canva)
];
const DEFAULT_NOPE = [
  "8e52cb75-7a93-447a-85bd-f3f939d8397f", // Beyond Silicon Valley
  "193d8c66-6a5b-40bc-a2a9-5811afd99661", // Stop Blocking, Start Building
  "377b9ced-16f0-426f-9c03-a0cd2e4b329b", // Having your cake and eating it
  "84770edf-b713-40c6-a44c-e31c3f81d735", // Panel: Governance & Ethics
  "bb99f984-5555-4b3e-aa2a-e5b50d3ff571", // Building Frameworks Building Systems
  "3a143407-d73d-4490-bcdf-01d470779e73", // Why AI coding tools might not make a difference
  "5de6fa13-5f49-418f-88f2-5bcf5eb04ea9", // The Software Engineer Who Don't Code
  "02c0c449-ea60-46b0-9819-49e0a29cc087"  // The Red Flags of Vibe Coding a Dating app
];

const toMin = t => { const [h,m]=t.split(':').map(Number); return h*60+m; };
const fmt = t => { let [h,m]=t.split(':').map(Number); const ap=h>=12?'pm':'am'; h=h%12||12; return `${h}:${String(m).padStart(2,'0')}${ap}`; };
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// ---- starred + ruled-out state ----
// Curated in code (DEFAULT_STARS / DEFAULT_NOPE above) — not editable from the page.
const stars = new Set(DEFAULT_STARS);
const nope  = new Set(DEFAULT_NOPE);

let curDay = 0, starOnly = false, hideNope = false;
const trackOff = new Set();

// Non-interactive status badge shown on a card.
function marks(id){
  if(stars.has(id)) return `<span class="marks star" title="On my schedule">★</span>`;
  if(nope.has(id))  return `<span class="marks nope" title="Ruled out">⊘</span>`;
  return '';
}

function buildDayTabs(){
  const wrap=document.getElementById('daytabs'); wrap.innerHTML='';
  DATA.days.forEach((d,i)=>{
    const b=document.createElement('button');
    b.textContent=d.label.split(',').slice(0,2).join(',');
    b.className=i===curDay?'active':'';
    b.onclick=()=>{curDay=i;buildDayTabs();render();};
    wrap.appendChild(b);
  });
}
function buildTrackFilters(tracks){
  const wrap=document.getElementById('trackfilters'); wrap.innerHTML='';
  tracks.forEach(t=>{
    const c=document.createElement('button');
    c.className='chip'+(trackOff.has(t.name)?' off':'');
    c.style.setProperty('--c',TRACK_COLORS[t.name]||'#888');
    c.innerHTML=`<span class="dot"></span>${esc(t.name)}`;
    c.onclick=()=>{trackOff.has(t.name)?trackOff.delete(t.name):trackOff.add(t.name);render();};
    wrap.appendChild(c);
  });
}

function matchQ(s,q){
  if(!q) return true;
  const spk=(s.speakers||[]).map(x=>x.full_name).join(' ');
  return (s.title+' '+spk+' '+(s.description||'')+' '+s.type).toLowerCase().includes(q);
}

function render(){
  document.getElementById('staronly').className='chip starchip'+(starOnly?' on':'');
  const day=DATA.days[curDay];
  buildTrackFilters(day.tracks);
  const isMobile = window.innerWidth <= MOBILE_BP;
  isMobile ? renderList(day) : renderGrid(day);
}

// ---------- mobile agenda ----------
function renderList(day){
  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  const main=document.getElementById('main'); main.innerHTML='';
  const wrap=document.createElement('div'); wrap.className='agenda';

  let items=[];
  day.tracks.forEach(t=>{ if(trackOff.has(t.name))return;
    t.sessions.forEach(s=>{
      if(starOnly && !stars.has(s.id)) return;
      if(hideNope && nope.has(s.id)) return;
      if(!matchQ(s,q)) return;
      items.push({s,track:t.name});
    });
  });
  items.sort((a,b)=> toMin(a.s.start_time)-toMin(b.s.start_time) || a.track.localeCompare(b.track));

  if(!items.length){
    wrap.innerHTML=`<div class="emptynote">${starOnly?'No starred sessions on this day yet — tap ☆ to add some.':'Nothing matches.'}</div>`;
    main.appendChild(wrap); setCount(items.length,q); return;
  }

  let lastTime=null, group=null;
  items.forEach(({s,track})=>{
    if(s.start_time!==lastTime){
      lastTime=s.start_time;
      group=document.createElement('div'); group.className='timegroup';
      const h=document.createElement('h3'); h.textContent=`${fmt(s.start_time)} – ${fmt(s.end_time)}`;
      group.appendChild(h); wrap.appendChild(group);
    }
    const spk=(s.speakers||[]).map(x=>x.full_name).filter(Boolean).join(', ');
    const el=document.createElement('div');
    el.className='lcard'+(stars.has(s.id)?' starred':'')+(nope.has(s.id)?' nope':'');
    el.style.setProperty('--c',TRACK_COLORS[track]||'#888');
    el.innerHTML=`${marks(s.id)}
      <p class="t">${esc(s.title)}</p>
      <div class="meta"><span class="tk"><span class="dot"></span>${esc(track)}</span><span class="badge">${esc(s.type)}</span>${s.location?`<span>${esc(s.location)}</span>`:''}</div>
      ${spk?`<div class="spk">${esc(spk)}</div>`:''}`;
    bindCard(el,s,track);
    group.appendChild(el);
  });
  main.appendChild(wrap);
  setCount(items.length,q);
}

// ---------- desktop timeline ----------
function renderGrid(day){
  const tracks=day.tracks.filter(t=>!trackOff.has(t.name));
  const main=document.getElementById('main'); main.innerHTML='';
  const gw=document.createElement('div'); gw.className='gridwrap';
  const grid=document.createElement('div'); grid.className='grid'; grid.id='grid';
  gw.appendChild(grid); main.appendChild(gw);

  let lo=24*60, hi=0;
  day.tracks.forEach(t=>t.sessions.forEach(s=>{lo=Math.min(lo,toMin(s.start_time));hi=Math.max(hi,toMin(s.end_time));}));
  lo=Math.floor(lo/60)*60; hi=Math.ceil(hi/60)*60;
  const totalH=(hi-lo)*PXMIN;

  grid.style.gridTemplateColumns=`64px repeat(${tracks.length}, minmax(180px, 1fr))`;
  grid.style.gridTemplateRows=`${HEAD_H}px ${totalH}px`;

  const corner=document.createElement('div'); corner.className='col-head timehead'; corner.textContent='Time'; grid.appendChild(corner);
  tracks.forEach(t=>{
    const h=document.createElement('div'); h.className='col-head';
    h.style.setProperty('--c',TRACK_COLORS[t.name]||'#888');
    h.innerHTML=`<span class="dot"></span>${esc(t.name)}`; grid.appendChild(h);
  });

  const tcol=document.createElement('div'); tcol.className='timecol'; tcol.style.position='relative';
  for(let m=lo;m<=hi;m+=60){
    const lab=document.createElement('div'); lab.className='timelabel'; lab.style.top=((m-lo)*PXMIN)+'px';
    lab.textContent=fmt(`${Math.floor(m/60)}:${String(m%60).padStart(2,'0')}`); tcol.appendChild(lab);
  }
  grid.appendChild(tcol);

  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  let shown=0, hits=0;

  tracks.forEach(t=>{
    const area=document.createElement('div'); area.className='track-area'; area.style.position='relative';
    for(let m=lo;m<=hi;m+=60){ const hl=document.createElement('div'); hl.className='hourline'; hl.style.top=((m-lo)*PXMIN)+'px'; area.appendChild(hl); }
    t.sessions.forEach(s=>{
      if(starOnly && !stars.has(s.id)) return;
      if(hideNope && nope.has(s.id)) return;
      const top=(toMin(s.start_time)-lo)*PXMIN;
      const h=Math.max((toMin(s.end_time)-toMin(s.start_time))*PXMIN, 22);
      const el=document.createElement('div');
      el.className='session'+(h<40?' tiny':'')+(stars.has(s.id)?' starred':'')+(nope.has(s.id)?' nope':'');
      el.style.top=top+'px'; el.style.height=(h-4)+'px';
      el.style.setProperty('--c',TRACK_COLORS[t.name]||'#888');
      const spk=(s.speakers||[]).map(x=>x.full_name).filter(Boolean).join(', ');
      el.innerHTML=`${marks(s.id)}<p class="t">${esc(s.title)}</p>
        <div class="meta"><span class="badge">${esc(s.type)}</span><span>${fmt(s.start_time)}–${fmt(s.end_time)}</span>${s.location?`<span>· ${esc(s.location)}</span>`:''}</div>
        ${spk?`<div class="spk">${esc(spk)}</div>`:''}`;
      bindCard(el,s,t.name);
      if(q){ matchQ(s,q)?(el.classList.add('hit'),hits++):el.classList.add('dim'); }
      area.appendChild(el); shown++;
    });
    if(day.date===TODAY){
      const now=new Date(); const nm=now.getHours()*60+now.getMinutes();
      if(nm>=lo&&nm<=hi){ const nl=document.createElement('div'); nl.className='nowline'; nl.style.top=((nm-lo)*PXMIN)+'px'; area.appendChild(nl); }
    }
    grid.appendChild(area);
  });
  setCount(shown,q,hits);
}

function bindCard(el,s,track){
  el.addEventListener('click',()=>openModal(s,track));
}
function setCount(n,q,hits){
  document.getElementById('count').textContent = q ? `${hits||0} match${hits===1?'':'es'}` : (starOnly?`${n} starred`:`${n} sessions`);
}

function openModal(s,track){
  const card=document.getElementById('card');
  const on=stars.has(s.id), isNope=nope.has(s.id);
  const spk=(s.speakers||[]).map(x=>`
    <div class="spkrow">
      ${x.photo_url?`<img src="${x.photo_url}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">`:'<img alt="">'}
      <div><div class="nm">${esc(x.full_name||'')}</div><div class="jt">${esc([x.job_title,x.employer].filter(Boolean).join(' · '))}</div></div>
    </div>`).join('');
  card.innerHTML=`
    <div class="top-row">
      ${on?'<span class="statuspill star">★ On my schedule</span>':isNope?'<span class="statuspill nope">⊘ Ruled out</span>':'<span class="statuspill">Not yet decided</span>'}
      <button class="close" onclick="closeModal()">×</button>
    </div>
    <h2>${esc(s.title)}</h2>
    <div class="cmeta"><span class="badge">${esc(s.type)}</span><span>${esc(track)}</span><span>${fmt(s.start_time)}–${fmt(s.end_time)}</span>${s.location?`<span>${esc(s.location)}</span>`:''}</div>
    ${s.description?`<div class="desc">${esc(s.description)}</div>`:''}
    ${spk?`<div class="spklist">${spk}</div>`:''}`;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeModal();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
document.getElementById('search').addEventListener('input',render);
document.getElementById('staronly').onclick=()=>{starOnly=!starOnly;render();};
document.getElementById('hidenope').onclick=()=>{hideNope=!hideNope;render();};
