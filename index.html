<script id="DATA" type="application/json">{"conference": {"slug": "ai-engineer-melbourne-2026", "name": "AI Engineer Melbourne 2026", "url": "https://webdirections.org/ai-engineer/"}, "updated_at": "2026-06-02T11:59:21.869Z", "days": [{"date": "2026-06-03", "label": "Wednesday June 3, 2026", "tracks": [{"name": "Keynote", "sessions": [{"id": "ad17977a-a954-4b28-bab4-604dc7a78c1d", "title": "Welcome", "description": "Take a seat and get ready for two intense days of world-class speakers.", "type": "housekeeping", "track": "Keynote", "start_time": "09:30", "end_time": "09:40", "duration_minutes": 10, "location": "Cinema 1", "speakers": [{"full_name": "John Allsopp", "job_title": null, "employer": null, "photo_url": "https://speakers.webdirections.org/photos/photo/6d9925a3-96dc-47c8-bb7e-2643e2a0ba56?v=1776285112228"}]}, {"id": "6229fde5-cef0-4a30-8f7e-2717dfb505ab", "title": "Opening Words", "description": "Opening words from the Victorian Government.", "type": "keynote", "track": "Keynote", "start_time": "09:35", "end_time": "09:40", "duration_minutes": 5, "location": "Cinema 1", "speakers": [{"full_name": "Ashling James", "job_title": "Director, Digital Economy and Innovation Policy", "employer": "Department of Jobs, Skills, Industry and Regions", "photo_url": "https://speakers.webdirections.org/photos/photo/5ccbddeb-ba84-4537-9fd9-e3c494f8554f?v=1780354480824"}]}, {"id": "eee65054-2c79-4f20-b5e8-1be2f96c43b0", "title": "State of the AI Model Landscape", "description": "An analysis of the leading AI models and the real trade-offs between them across intelligence, speed, price, token usage, and beyond, grounded in Artificial Analysis' independent benchmarking. Includes a forward-looking read on the trends shaping where AI is heading.", "type": "keynote", "track": "Keynote", "start_time": "09:40", "end_time": "09:58", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "George Cameron", "job_title": "Co-founder & CPO", "employer": "Artificial Analysis", "photo_url": "https://speakers.webdirections.org/photos/photo/007ccde8-d61b-4a85-af0e-e4c411366163?v=1774136303685"}]}, {"id": "cfbcf295-21d8-445b-9210-af0999b2acfd", "title": "Token Town (why compute strategy is product strategy)", "description": "Token pricing is a noisy headline. What matters in production is what you pay per task once outputs get longer, retries creep in, and \u201cgood enough\u201d models get deprecated. \r\n\r\nThis talk breaks down the current dynamics of the frontier model market from the perspective of Notion AI product team on embarking this with Notion custom agents model, and shares a practical playbook for keeping leverage: stay genuinely multi-provider, invest in product value that is hard to undercut, and use open weight models as an escape hatch for everyday workloads that do not need frontier reasoning.", "type": "keynote", "track": "Keynote", "start_time": "10:00", "end_time": "10:20", "duration_minutes": 20, "location": "Cinema 1", "speakers": [{"full_name": "Sarah Sachs", "job_title": "Eng Lead, AI", "employer": "Notion", "photo_url": "https://speakers.webdirections.org/photos/photo/2dc21018-e35b-44bc-89b6-70ee275910bf?v=1775532276719"}]}, {"id": "851ec294-eece-4ac8-8fd3-dfda1df3f754", "title": "Everything Is a Factory", "description": "Software development as we knew it is dead. The old world of hand-crafting every line, endless hiring cycles, and fragile vertical stacks has been overtaken by AI-driven software factories that turn simple prompts into fully functional software through automated iteration. This keynote traces the journey from the Ralph Wiggum Loop to Loom and beyond, exploring what it means when code becomes a commodity and engineering becomes orchestration.", "type": "keynote", "track": "Keynote", "start_time": "10:20", "end_time": "10:40", "duration_minutes": 20, "location": "Cinema 1", "speakers": [{"full_name": "Geoff Huntley", "job_title": "Founder", "employer": "Latent Patterns", "photo_url": "https://speakers.webdirections.org/photos/photo/24c49c60-91a2-442f-bb69-fadd2483db83?v=1774136315913"}]}, {"id": "afe2b74f-3710-4732-9983-1312411aba56", "title": "Why Your Coding Agent Forgets Everything", "description": "Why Your Coding Agent Forgets Everything\r\n\r\nModern coding agents can write code, run tests, and solve complex tasks, yet most start every session with no memory of what happened before. In this talk, we\u2019ll explore why today\u2019s agents are fundamentally stateless, how memory changes their behaviour, and what happens when agents can learn, remember, and improve over time. Through real-world experiments building large-scale agent systems, we\u2019ll look at the path from simple LLMs to persistent, memory-driven software systems.", "type": "keynote", "track": "Keynote", "start_time": "10:40", "end_time": "11:00", "duration_minutes": 20, "location": "Cinema 1", "speakers": [{"full_name": "Igor Costa", "job_title": "CEO", "employer": "Autohand AI", "photo_url": "https://speakers.webdirections.org/photos/photo/72bec9ae-0a0f-4b72-b1f1-38b4317da974?v=1774136175250"}]}, {"id": "101adb53-3e1c-47df-b4d8-69692ec3f99f", "title": "Three Lanes Below One Millisecond: A Rust SDK for Gemini Live", "description": "Full-duplex voice agents punish the choices text-only agents forgive. A 50ms GC pause is a perceptible glitch. A blocked event loop is a barged-in user talking over your model. Google\u2019s Python ADK is a beautiful kit for building agents \u2014 until audio frames arrive every 20 milliseconds and refuse to wait.\r\n\r\nThis talk walks through gemini-rs, an open-source Rust SDK that rebuilds Google\u2019s Agent Development Kit and the Gemini Multimodal Live wire protocol from scratch, in three layered crates: a zero-copy WebSocket transport, an agent runtime with phase machines and typed prefix-scoped state, and a fluent builder where a production voice agent fits in twenty lines of declarative Rust.\r\n\r\nThe architectural keystone is a three-lane processor: a sync fast lane for audio and VAD under one millisecond, an async control lane for tool dispatch and phase transitions, and a debounced telemetry lane built on atomics. We\u2019ll cover what broke in the naive translation, why Vertex AI sends binary frames where Google AI sends text, how to compose tool-using agents without rebuilding LangChain, and where the Python ADK still belongs in the stack.", "type": "keynote", "track": "Keynote", "start_time": "11:00", "end_time": "11:20", "duration_minutes": 20, "location": "Cinema 1", "speakers": [{"full_name": "Vamsi Ramakrishnan", "job_title": "AI Lead Engineer, APAC", "employer": "Google Cloud", "photo_url": "https://speakers.webdirections.org/photos/photo/9e29f1b0-f799-4187-94c5-d55590f4d7db?v=1778544756878"}]}, {"id": "9149fbd5-bfba-4618-bba5-027b6c742f0f", "title": "Keynote outro", "description": "We'll wrap up the first session ahead of a well-earned break.", "type": "housekeeping", "track": "Keynote", "start_time": "11:20", "end_time": "11:30", "duration_minutes": 10, "location": "Cinema 1", "speakers": [{"full_name": "John Allsopp", "job_title": null, "employer": null, "photo_url": "https://speakers.webdirections.org/photos/photo/6d9925a3-96dc-47c8-bb7e-2643e2a0ba56?v=1776285112228"}]}]}, {"name": "Hallway", "sessions": [{"id": "6245259c-2daa-4e89-9d54-e6f890cdec95", "title": "Build long running AI agents that pause resume and never lose context with ADK", "description": "How do you build AI agents that survive weeks of idle time, container restarts, and complex cross-team handoffs? Traditional stateless loops fail under context pollution, soaring token costs, and hallucinated progress.\r\nThis session dives deep into Google's Agent Development Kit (ADK) to build robust, long-running agentic workflows. We\u2019ll break down a production-ready, three-pillar architecture:\r\n* Durable State Machines: Enforcing explicit state schemas instead of relying on raw chat history \r\n* Event-Driven Resumption: Waking dormant agents via FastAPI webhooks, allowing scale-to-zero during idle time \r\n* Multi-Agent Coordination: Delegating tasks to specialized, focused sub-agents to keep reasoning sharp \r\nWalk away with a practical, code-first playbook to ship enterprise background agents", "type": "talk", "track": "Hallway", "start_time": "11:45", "end_time": "12:05", "duration_minutes": 20, "location": "Gandel Digital Future Lab", "speakers": [{"full_name": "Nakul Gowdra", "job_title": "AI/ML Architect", "employer": "Google", "photo_url": "https://speakers.webdirections.org/photos/photo/999e6e08-78fa-4826-bb7d-a42acb641cac?v=1780184412394"}]}, {"id": "6056e3a7-4bcf-403b-b85e-67abaa067001", "title": "AI Hamsters: Circling Your Way to Success", "description": "Every AI engineer knows the loop \u2014 prompt tweaks, evals, regressions, repeat. It feels like going in circles. But that's not the problem. The problem is not knowing if each circle is tighter than the last. This talk is about how Langfuse turns iteration from an act of faith into something measurable \u2014 traces, scores, and evals that tell you whether you're actually moving forward or just staying busy.\r\n\r\nBut the loop isn't just for the developer anymore. Tools like Cursor and Claude Code can tap into Langfuse mid-build, check whether recent changes moved things in the right direction, and keep iterating without waiting on you. The feedback loop becomes part of the development process itself \u2014 and that's when the wheel really starts to spin.", "type": "talk", "track": "Hallway", "start_time": "12:10", "end_time": "12:30", "duration_minutes": 20, "location": "Gandel Digital Future Lab", "speakers": [{"full_name": "Muhammad Ali", "job_title": "Senior Solution Architect", "employer": "ClickHouse", "photo_url": "https://speakers.webdirections.org/photos/photo/e6d1c7d9-b7a6-417e-a1ef-f7ce04ef4744?v=1777526003674"}]}, {"id": "288275a3-9b91-49ac-ae22-767e4945d5d8", "title": "Optimising GenAI at Runtime with Experimentation and Guardrails", "description": "Generative AI systems evolve constantly, and the impact of prompt or model changes often isn\u2019t clear until real users interact with them in production. In this session, learn how teams can safely experiment with AI at runtime, testing models and prompts with targeted rollouts, evaluating system outputs online, and optimising against real business results using AgentControl.", "type": "talk", "track": "Hallway", "start_time": "12:40", "end_time": "13:00", "duration_minutes": 20, "location": "Gandel Digital Future Lab", "speakers": [{"full_name": "Aaron Montana", "job_title": "Head of Experimentation", "employer": "LaunchDarkly", "photo_url": "https://speakers.webdirections.org/photos/photo/24f88332-548d-4e9f-adeb-f83f77c65afe?v=1778614811791"}]}, {"id": "d3dcc0ae-5e35-4088-b479-f40ae3d94f45", "title": "The State of the AI Engineering Job Market in Australia", "description": "Jake Maloney is the founder of AI Jobs Australia, a job board dedicated to Artificial Intelligence, Machine Learning, Data Science, and AI-adjacent emerging roles. That vantage point gives him insight into the Australian market that few others have.\r\n\r\nIn this session, Jake shares the latest intel on which roles are in demand, what salaries are being offered, where the gaps are, and what employers are really looking for in AI engineering hires.", "type": "talk", "track": "Hallway", "start_time": "13:10", "end_time": "13:20", "duration_minutes": 10, "location": "Gandel Digital Future Lab", "speakers": [{"full_name": "Jake Maloney", "job_title": "Founder", "employer": "AI Jobs Australia", "photo_url": "https://speakers.webdirections.org/photos/photo/f9d6eb24-cec1-4ba9-88fa-fd3e8a6bf917?v=1779249097720"}]}, {"id": "66368878-30b6-4d89-a3a5-079e65cac6e4", "title": "Who Needs a LoRA?", "description": "Can you faithfully edit hand-drawn illustrations using an image model you haven\u2019t fine-tuned? Most practitioners assume you need a LoRA for style-faithful editing. I set out to prove otherwise \u2014 building a production system that edits character avatars in an educational platform, changing their facial expressions to match the emotion of their dialogue. The constraint: every edit had to look like the original artist drew it themselves.\r\n\r\nNo blog posts or tutorials existed for this, so academic papers on diffusion-based editing were the starting point. Following the literature\u2019s advice got results fast \u2014 but also surfaced failures that were as instructive as the wins. I\u2019ll walk through a gallery of what went wrong: Disneyfication (the model defaulting to generic cartoon features), colour convergence toward a yellowish haze across sequential edits (the \u201cpiss filter\u201d), hand-crafted brushstroke imperfections being smoothed away, and the discovery that negative prompts function as reverse psychology for diffusion models.\r\n\r\nThe three principles that emerged: \r\n1. Prompt entropy predicts drift - the less you describe, the more faithfully the model preserves style\r\n2. Describe movements (\u201cdrop the jaw\u201d), not how features look (\u201coval opening\u201d), so the model applies its own intuition for that specific character\r\n3. Parallel feature edits from the pristine original, recombined by the model, beat sequential chains \u2014 because drift is architectural, not a prompting bug. \r\n\r\nThis talk is for anyone building AI tools for creative workflows, anyone prompting image models for controlled edits, or anyone curious about what\u2019s possible with off-the-shelf image generation today.", "type": "talk", "track": "Hallway", "start_time": "13:25", "end_time": "13:35", "duration_minutes": 10, "location": "Gandel Digital Future Lab", "speakers": [{"full_name": "Charli Posner", "job_title": "Builder", "employer": "Stile Education", "photo_url": "https://speakers.webdirections.org/photos/photo/429b809f-62da-4eea-85b0-f61b0030e4f7?v=1774136202650"}]}, {"id": "815d54fe-4166-4f0f-a341-c83b23e3d039", "title": "Don't Be Cheap: AI and the Appearance of Engineering", "description": "Software engineering has a pattern: demanding practices arrive and get reduced to their ceremonies. Agile kept the standups, lost the discipline. DevOps kept the postmortems, lost the learning. The form survives. The demand disappears. This has happened before, and there's a name for it. AI accelerates the pattern. It generates tests, PRs, architecture notes, and incident summaries without requiring the understanding those artefacts used to demand. The output looks mature. The numbers tell a different story. This talk names the pattern, draws a line between frugal AI use and cheap AI use, and asks what happens to engineers when the demanding work that formed them becomes optional.", "type": "talk", "track": "Hallway", "start_time": "13:40", "end_time": "13:50", "duration_minutes": 10, "location": "Gandel Digital Future Lab", "speakers": [{"full_name": "Birger Halfmeier", "job_title": "Senior Cloud Architect", "employer": "DoiT International", "photo_url": "https://speakers.webdirections.org/photos/photo/92c283b4-5592-4ee5-ade3-98df5b02910a?v=1778630241230"}]}, {"id": "5de6fa13-5f49-418f-88f2-5bcf5eb04ea9", "title": "The Software Engineer Who Don't Code", "description": "AI coding tools are rewriting what it means to build software, turning engineers into architects, reviewers, and orchestrators of AI-generated code rather than authors of every line. This talk explores the emerging reality where software engineers spend less time writing code and more time defining problems, evaluating solutions, and steering AI agents. We'll look at what skills matter more now, what matters less, and how to stay effective (and relevant) when your most productive teammate is an LLM.", "type": "talk", "track": "Hallway", "start_time": "13:55", "end_time": "14:05", "duration_minutes": 10, "location": "Gandel Digital Future Lab", "speakers": [{"full_name": "Yasith Fernando", "job_title": "Staff Software Engineer", "employer": null, "photo_url": "https://speakers.webdirections.org/photos/photo/afbe86dd-6e52-44e7-8b17-533343f33d29?v=1774136223185"}]}, {"id": "dc3cf8d1-1e31-4b33-91a6-3770af0ba6c6", "title": "How to Get Fired as an AI Engineer", "description": "The fastest way to become irrelevant is to keep doing the job exactly as it was defined last year. AI hasn't removed the engineer from the loop; it has changed which loop is worth owning. This talk is about the new engineering bar forming as code gets easier, judgement gets scarcer, and confidence has to be earned, not assumed \u2014 and the habits that quietly put you on the wrong side of it.", "type": "talk", "track": "Hallway", "start_time": "14:10", "end_time": "14:20", "duration_minutes": 10, "location": "Gandel Digital Future Lab", "speakers": [{"full_name": "Kanish Gosain", "job_title": "AI Engineer", "employer": "Radical Intelligence", "photo_url": "https://speakers.webdirections.org/photos/photo/0c7272fe-8a83-4bd4-99f8-68cea63d2f71?v=1779177073766"}]}, {"id": "02c0c449-ea60-46b0-9819-49e0a29cc087", "title": "The Red Flags of Vibe Coding a Dating app", "description": "Move fast. Follow the vibe. Launch it.\r\n\r\nThat works\u2026 until you\u2019re building a dating app.\r\n\r\nBased on real world experiments building AI driven dating and community tools, this talk breaks down what actually happens when you rely on instinct and prompts to design for human connection. Think broken matching logic, confident but wrong recommendations, privacy gaps, token burn, using the wrong platforms, and systems that don\u2019t survive real users.\r\n\r\nA practical look at where vibe coding works, where it fails, and what to fix before your product creates outcomes you didn\u2019t intend.", "type": "talk", "track": "Hallway", "start_time": "14:25", "end_time": "14:35", "duration_minutes": 10, "location": "Gandel Digital Future Lab", "speakers": [{"full_name": "Karina Pamamull", "job_title": "AI Speaker, Trainer & Consultant", "employer": "Self Employed", "photo_url": "https://speakers.webdirections.org/photos/photo/91b2e25f-048c-46a4-b9bf-f05ee5a87dda?v=1774136180188"}]}, {"id": "7fdd6c5a-4c3b-497a-af92-b00bc7e10308", "title": "One Tool to Rule them all: Building a Fast AI Agent for Real-Time Response", "description": "When your goal is to make an agent fast enough to explore millions of data points and find the true cause of incidents in minutes, the way you engineer agents fundamentally changes.\r\n\r\nCome with me as we explore how we built a fast and reliable agent for live risk limit breaches with only one tool: a Python interpreter. We\u2019ll cover the kind of custom backpressure and speedups you gain while in an interpreter, some whacky checks you can do with ASTs and the design trade-offs you face when building agents in this manner", "type": "talk", "track": "Hallway", "start_time": "14:40", "end_time": "15:00", "duration_minutes": 20, "location": "Gandel Digital Future Lab", "speakers": [{"full_name": "Ryan Samarakoon", "job_title": "Software Engineer", "employer": "Optiver", "photo_url": "https://speakers.webdirections.org/photos/photo/9515def0-9902-4fe0-a096-ddc2db7d9971?v=1779247020761"}]}, {"id": "a3167048-077d-476d-9348-2ceb24fe8076", "title": "Everyone Wants AI Capacity Now. Few Are Actually Running It.", "description": "Getting AI capacity is one thing. Getting it production-ready, sovereign, and built beyond the model is another. We cover the trends driving AI service demand, how foundation models are converging (and whether picking one over another still matters), and what a platform built for flexibility, governance, and real-world deployment actually looks like.", "type": "talk", "track": "Hallway", "start_time": "15:40", "end_time": "16:00", "duration_minutes": 20, "location": "Gandel Digital Future Lab", "speakers": [{"full_name": "Daniel Apps", "job_title": "Head of Solutions", "employer": "ResetData", "photo_url": "https://speakers.webdirections.org/photos/photo/f8d4f32b-0131-4917-99f1-36dec3244515?v=1779872824180"}]}, {"id": "1c90e24b-d001-4ff8-9b72-ee04e8b71fd3", "title": "The Agentic Contract: A practical framework from enterprises shipping agents to production", "description": "Most enterprise AI agent projects stall between POC and production because teams can't answer a basic question: is the agent actually performing as expected? This talk shares the practical framework we've developed with enterprise customers for defining agentic contracts and managing quality and risk as two sides of the same coin, so agents behave the way the business needs them to in production.", "type": "talk", "track": "Hallway", "start_time": "16:10", "end_time": "16:20", "duration_minutes": 10, "location": "Gandel Digital Future Lab", "speakers": [{"full_name": "Matt Doughty", "job_title": "Co-Founder and CEO", "employer": "Prefactor", "photo_url": "https://speakers.webdirections.org/photos/photo/c3fe1d7d-bbd8-4de9-bef3-0d7e77d7079d?v=1778616805492"}]}, {"id": "e16a1159-1249-43e4-ad30-be0e8a47aca1", "title": "Democratizing Frontier LLMs - Cloud-cluster scale intelligence running on any Desktop PC", "description": "Explore the engineering breakthroughs behind running state-of-the-art, ultra-large Mixture-of-Experts models (100B-600B+ parameters) entirely offline on consumer-grade desktop hardware. This session dives deep into our novel storage-centric inference engine, developed by Monadd-AI and a research partner, that leverages dynamic expert offloading, hardware-topology-aware scheduling and prefetching algorithms to run Frontier LLMs directly on PCs. Learn how we run cloud-computing scale AI models without cloud-computing scale resources, just on a Desktop PC, with a live demonstration of a massive MoE model running locally.", "type": "talk", "track": "Hallway", "start_time": "16:25", "end_time": "16:35", "duration_minutes": 10, "location": "Gandel Digital Future Lab", "speakers": [{"full_name": "Obadiah Pewee", "job_title": "Chief Executive Officer", "employer": "Monadd-AI", "photo_url": "https://speakers.webdirections.org/photos/photo/1d4484d0-17e0-4ea4-9a0b-3fd5321f844a?v=1774136195120"}]}, {"id": "b0119233-cb8e-4533-ab37-15513ec59c6d", "title": "Code Trust and Verification for the AI Era", "description": "The rapid adoption of AI-generated code has created a massive verification bottleneck. While AI tools exponentially increase development speed, they often introduce subtle vulnerabilities and architectural risks. In this session, we explore how to bridge this AI trust gap. Discover how the SonarQube platform\u2014leveraging its own AI-powered code remediation, SonarQube Server, Cloud, and the new MCP Server\u2014acts as an independent verification layer. Learn to operationalize AI Code Assurance, ensuring all code remains secure, reliable, and production-ready.", "type": "talk", "track": "Hallway", "start_time": "16:40", "end_time": "17:00", "duration_minutes": 20, "location": "Gandel Digital Future Lab", "speakers": [{"full_name": "Andre Kolodochka", "job_title": "Solutions Engineer", "employer": "Sonar", "photo_url": "https://speakers.webdirections.org/photos/photo/5b78ff0f-79ed-4850-9333-c585516c7ef8?v=1779965199018"}]}, {"id": "ff94bb93-c8ed-4321-9b6a-caf5decf0aef", "title": "Vibe-coded Multiplayer Video Games", "description": "Every had a great idea for a video game but developing it always felt out of reach? AI is at a point now, where you can develop fully-fledged, multiplayer online games without needing to code. I'll take you through my workflow and how to get your game built quickly and cheaply!", "type": "talk", "track": "Hallway", "start_time": "17:05", "end_time": "17:15", "duration_minutes": 10, "location": "Gandel Digital Future Lab", "speakers": [{"full_name": "Dr Sam Donegan", "job_title": "Medical Doctor, AI Engineer & President @ MLAI", "employer": "MLAI", "photo_url": "https://speakers.webdirections.org/photos/photo/2d6514a3-5a03-45a8-9f08-2c5972644a3a?v=1774138105743"}]}]}, {"name": "Software Engineering", "sessions": [{"id": "59f339cd-b291-4836-8ee0-f0e3cd6629b3", "title": "Fail fast, fix faster: Why faster AI models beat smarter ones", "description": "The smartest model doesn't always win.\r\n\r\nIn agentic coding loops, a model that is 10x faster but only marginally competent can often fail its way to success before a frontier model finishes reasoning.\r\n\r\nAJ Fisher breaks down the maths behind this counterintuitive result using diffusion models like Inception Labs' Mercury 2. Unlike autoregressive models that generate tokens sequentially, diffusion models refine outputs in parallel, removing a serial bottleneck that slows iterative agent loops.\r\n\r\nIf each attempt improves a solution by even 20%, dozens of iterations per minute quickly compound into faster convergence than slow, high-quality reasoning.\r\n\r\nWith live code examples and a bit of napkin maths, this talk shows why loop velocity is becoming the dominant factor in AI-assisted engineering, and why verification, not model intelligence, will become the real bottleneck.\r\n\r\nThe key question isn't \"how smart is your model?\" It's \"how fast is your loop?\"", "type": "talk", "track": "Software Engineering", "start_time": "12:30", "end_time": "12:48", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "AJ Fisher", "job_title": "Technologist & Writer", "employer": "ajfisher.me", "photo_url": "https://speakers.webdirections.org/photos/photo/e3cfdc31-2952-4db1-8124-21bf9d6bbba8?v=1774136217976"}]}, {"id": "bb99f984-5555-4b3e-aa2a-e5b50d3ff571", "title": "Building Frameworks Building Systems", "description": "CI infrastructure is ripe for the vibing \u2014 so why don\u2019t we? I have been.\r\n\r\nOur company must deliver 200 interactive science and maths games for millions of students this year. Only a few years ago were we making 30, by hand, for significantly fewer students. Rather than handcrafting 200 interactive games though\u2026what if we could make something do it for us? What if we could build a system that builds the system for us?\r\n\r\nCI is the perfect place for all our guardrails and all of our systems to come hang out. Without the right grounding, without the right guardrails\u2026 the pipelines drop off a cliff. Without the right observability stack, you can\u2019t see what\u2019s going on when things do go wrong \u2014 or when things go right. And then\u2026you can\u2019t scale it.\r\n\r\nSo I vibed it all. \r\n\r\nAnd it delivered.", "type": "talk", "track": "Software Engineering", "start_time": "12:50", "end_time": "13:08", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Ally Macdonald", "job_title": "Staff Builder", "employer": "Stile Education", "photo_url": "https://speakers.webdirections.org/photos/photo/4d11678c-cd62-4350-8c50-32de58475d96?v=1774136233449"}]}, {"id": "3a143407-d73d-4490-bcdf-01d470779e73", "title": "Why AI coding tools might not make the slightest difference", "description": "Most \u201cAI gives you 10x productivity\u201d stories assume coding is the bottleneck. For large and mature companies this is almost never the case, so you roll out AI coding tools, people feel faster, but delivery metrics barely move. In this talk I\u2019ll show how we used a Theory of Constraints approach at SEEK to find the actual bottlenecks holding back throughput, and how that changed our AI productivity strategy resulting in $1.5m / year in measured productivity gain.\r\n\r\nYou\u2019ll leave with a practical playbook: what to measure, how to run experiments, what interventions usually unlock the next step, and how to get investment that optimises both for humans and coding agents. We'll cover where AI can genuinely help cross-functionally across software delivery, and enabling changes you might need to roles and responsibilities, collaboration practices and platform capabilities.", "type": "talk", "track": "Software Engineering", "start_time": "13:10", "end_time": "13:28", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Jason Cornwall", "job_title": "Head of Engineering Enablement", "employer": "SEEK", "photo_url": "https://speakers.webdirections.org/photos/photo/d0ab22a0-41b5-4d22-b7ea-64bbec900e96?v=1774136258343"}]}, {"id": "c6901280-f221-476f-bf2d-2525ea77f8ee", "title": "Constitutional Prompting: Making AI Coding Agents Reliable Without the Iteration Tax", "description": "Every engineering team trying to automate developer workflows with AI agents hits the same wall: the iteration tax. You ask an agent to review a PR, scaffold a feature, or audit code quality \u2014 it does something almost right, you correct it, it overcorrects, you add guardrails, it gets confused. Four round-trips later you have acceptable output and a prompt that's fragile, opaque, and impossible to hand off to another engineer on your team.\r\n\r\nConstitutional prompting is a pattern that eliminates this loop for developer tooling. Instead of iterating toward correctness at runtime, you encode your team's engineering standards, workflow constraints, and output contracts directly into structured agent specifications - upfront, before the agent ever runs. Think of it as writing a constitution for how an agent should behave within your development workflow: parameter schemas, numbered workflow phases, anti-loop directives that prevent the agent from second-guessing itself, and typed JSON output contracts that make success or failure unambiguous.\r\n\r\nI've used this pattern to build [rp1](https://rp1.run), an open-source framework with 36 specialised agents that automate real developer workflows - review, feature development, code auditing, autonomous research - executing in a single pass without human intervention mid-workflow. Hundreds of engineers at Block use these agents daily, and the results have been striking: fewer iteration cycles, higher first-pass code quality, and agents that consistently follow team conventions without drift. The same pattern powers a map-reduce PR review pipeline that splits diffs across parallel sub-reviewers and a builder-reviewer loop where adversarial agents verify code against seven quality dimensions before it ever reaches a human.\r\n\r\nThis talk breaks down the anatomy of a constitutional agent for developer workflows, walks through the failure modes it prevents, and shares hard numbers on iteration reduction and first-pass success rates. You'll leave with a concrete framework you can apply to your own engineering automation immediately.", "type": "talk", "track": "Software Engineering", "start_time": "13:30", "end_time": "13:48", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Prem Pillai", "job_title": "Sr. AI Engineer", "employer": "Block Inc", "photo_url": "https://speakers.webdirections.org/photos/photo/2f8af2a4-00eb-42dc-9a87-83d5ea7f8c75?v=1774136265680"}]}, {"id": "a8145536-1aca-4b8e-849e-945f5ed9a4f7", "title": "From Zero to Production: How 15 Engineers Shipped a Production LLM Product with AI Coding Tools", "description": "How a team of fewer than 15 engineers at MYOB took an AI-powered chat experience from zero to production, embedded directly inside the product serving real small business owners and accountants. Leaning heavily into AI-assisted coding throughout the entire development lifecycle, using tools like Cursor and Claude Code as genuine force multipliers. Covers the AI Engineering challenges of productionising LLM features at scale \u2014 evaluation, guardrails, latency, hallucination management \u2014 and what it actually looks like when a small team uses AI coding tools to ship faster than anyone expected.", "type": "talk", "track": "Software Engineering", "start_time": "13:50", "end_time": "14:08", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Michael Zhang", "job_title": "Principal ML Engineer", "employer": "MYOB", "photo_url": "https://speakers.webdirections.org/photos/photo/8a2f1f77-3019-472c-b9dd-70de5b0b08d5?v=1779489407238"}]}, {"id": "8f1128aa-14a6-4d5e-9ef3-8e2788e15091", "title": "Multi-Armed Bandits: The Scientific Shotgun for Evals", "description": "A/B testing is too rigid a tool for AI systems. You're stuck serving worse results for the duration of the experiment and getting billed for slower models while three providers release SOTA updates this week.\r\n\r\nSteal a trick from data science instead and use multi-armed bandits to organically surface ideal models, prompting choices and harnesses. You want your evals to be more than scores\u2013 make them an exploration in minimising regret.", "type": "talk", "track": "Software Engineering", "start_time": "14:10", "end_time": "14:28", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Ron Au", "job_title": "Senior Software Engineer", "employer": "Canva (Leonardo.Ai)", "photo_url": "https://speakers.webdirections.org/photos/photo/6445e547-758e-46af-a6a7-350c19d4f973?v=1774136182827"}]}, {"id": "f45cb6cc-51d1-49a4-9842-82d370886d8e", "title": "Engineering for the Agentic Web When 50% of Your Traffic is Robots", "description": "Over the last two years, our customer web traffic changed: today around 50% of visitors were unknown browsers and AI agents. The era of aligning with the traditional search engine crawlers with Core Web Vitals is shifting; the new challenge is feeding focused low-noise context to autonomous agents and Large Language Models (LLMs).\r\n\r\nTraditional Search Engine Optimisation (SEO) relies on techniques such as keyword density, backlink tracking, and human-readable formatting, but when a significant part of your traffic suddenly becomes AI agents, how do you ensure your content is being parsed correctly by machines?\r\n\r\nOur team will share the strategic and architectural shifts the organisations are facing to embrace this new web reality. This isn't about meta-tags; it's about re-architecting how a business presents itself and its content in the AI-driven internet, including\r\n\r\n1. Identifying Agent Traffic: How to identify & separate agent traffic.\r\n\r\n2. Realigning Context: Trade-offs in modifying traditional website structure vs. serving structured markdown, llms.txt files, and specialised API endpoints.\r\n\r\n3. Omni Channel Content: Serving dual-experiences with web applications for humans versus data streams for agents.\r\n\r\n4. Lessons Learned: To block or embrace agent traffic, and how embracing \"LLM Instructions\" can increase content's reach.", "type": "talk", "track": "Software Engineering", "start_time": "15:30", "end_time": "15:48", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Janna Malikova", "job_title": "Software engineer", "employer": "Tomato Elephant Studio", "photo_url": "https://speakers.webdirections.org/photos/photo/5bfe867f-ec7c-4653-9b14-2abe6ab62db1?v=1774143920456"}]}, {"id": "6fcd869f-6384-4ea0-80d2-813ca1e18389", "title": "The AI Control Plane: When Your Infrastructure Becomes the Context Window", "description": "We've spent a decade codifying infrastructure, Terraform, Pulumi, CDK. This session explores what happens when you treat infrastructure as a queryable data layer: exposing cloud state, Skills giving agents reusable operational knowledge, and LLM gateways routing and governing model access. \n\nYou'll see how policy-as-code, using Cedar, becomes the guardrail, agents reason against, not just something humans enforce. Drawing from real builds, we'll break down the architecture of an AI control plane, LLM proxy, tool registry, Skills libraries, and governance controls and show how platform teams can give agents rich infrastructure context without giving away the keys.", "type": "talk", "track": "Software Engineering", "start_time": "15:50", "end_time": "16:08", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Bojan Zivic", "job_title": "Director - AI & Modernisation", "employer": "V2ai", "photo_url": "https://speakers.webdirections.org/photos/photo/998ca65c-e3e0-48e1-8f9b-76dac2a792f3?v=1774258095104"}]}, {"id": "98cd77b8-45e8-4494-87d9-f8deb3cbb5ee", "title": "Treating Infrastructure as Data: Building an AI-Native Control Plane", "description": "StackQL provides a unified control plane data model for agents, tools, processes and humans to interact with.  The StackQL MCP server exposes this unified interface to AI agents, allowing them to query, provision, and update cloud resources, including executing lifecycle operations.\r\n\r\nIn this session we will demonstrate agents performing multi-cloud inventory analysis, security posture queries, cost optimization, and  provisioning. We'll discuss lessons learned building an MCP server against multiple stateful provider backends.", "type": "talk", "track": "Software Engineering", "start_time": "16:10", "end_time": "16:28", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Jeffrey Aven", "job_title": "Maintainer", "employer": "StackQL Studios", "photo_url": "https://speakers.webdirections.org/photos/photo/17836589-1ad9-4722-a55e-787c5dca9e73?v=1774136299084"}]}, {"id": "43c59b31-3ace-4003-ab3c-4ab5403bce99", "title": "Your Agent Doesn't Like Your APIs", "description": "Every API you've shipped was designed for a human reading docs. Agents don't read docs - they load your entire tool schema into a context window every call, then burn tokens guessing which endpoint to try.\r\n\r\nTake a standard accounting API \u2014 clean REST, solid docs, every endpoint you'd expect. Point an agent at it with one task: get an invoice status. Watch it burn through tokens, pick the wrong endpoints, and maybe even give up. I'll demo this failure live, then rebuild it into a handful of outcome-oriented tools \u2014 and the same query that 'failed' now works in a single call at a fraction of the cost.\r\n\r\nThe fix isn't adding more endpoints or better docs. It's rethinking what a \"tool\" means when your consumer is an LLM, not a developer. These design principles have emerged in teams building agent-facing APIs keep converging on the same patterns, and they look nothing like good REST design.", "type": "talk", "track": "Software Engineering", "start_time": "16:30", "end_time": "16:48", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Mike Chambers", "job_title": "Senior Developer Advocate AI", "employer": "AWS", "photo_url": "https://speakers.webdirections.org/photos/photo/cd1f3476-e0f0-4dbb-8c7b-f8cdaac77d49?v=1774136235922"}]}, {"id": "c4331a08-d65f-49a4-a937-f73d60a4afa6", "title": "Agentic Self-Healing in Production", "description": "Your pipeline breaks at 2am. Nobody's watching. By morning, it's already fixed.\r\nThat's not wishful thinking \u2014 that's agentic self-healing in production.\r\nIn this talk, we'll explore how AI agents can monitor, diagnose, and autonomously recover failing pipelines without human intervention. We'll cover the patterns and architectures that make self-healing possible, the guardrails that keep agents from making things worse, and real-world lessons from building systems that fix themselves while you sleep.", "type": "talk", "track": "Software Engineering", "start_time": "16:50", "end_time": "17:08", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Jack McNicol", "job_title": "Lead Agentic Engineer", "employer": "SuperIT", "photo_url": "https://speakers.webdirections.org/photos/photo/9686d2be-c876-402b-9607-3e1bad4f39d5?v=1774150467837"}]}, {"id": "cbdec3ec-6e96-4869-9c36-2a5efb802222", "title": "How Canva built an Agentic Support Experience using Langfuse Observability", "description": "At Canva, our support experience is powered by multiple AI systems, from real-time assistance to asynchronous ticket resolution that handles complex, multi-step workflows and escalates to humans when needed. In this talk, we\u2019ll share how we took these systems from MVP to serving Canva\u2019s 250M+ users, and the infrastructure we built along the way to get there safely.\r\n\r\nWe\u2019ll cover how traces helped us debug complex agent workflows, how prompt management unlocked safe iteration through shadowing and localisation, and how we built continuous evaluation loops using LLM-as-judge, offline datasets, and human feedback, using tools like Langfuse alongside internal tooling we developed.\r\n\r\nWe\u2019ll also share practical lessons from running experiments, replaying real support scenarios, and the things we wish we\u2019d known earlier about scaling AI systems in production.", "type": "talk", "track": "Software Engineering", "start_time": "17:10", "end_time": "17:28", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Sergey Iakovlev", "job_title": "Lead ML Engineer", "employer": "Canva", "photo_url": "https://speakers.webdirections.org/photos/photo/7ac1a082-9fb6-4733-897d-0df8d66b9da1?v=1777849905686"}, {"full_name": "Sahil Bahl", "job_title": "Senior ML Engineer", "employer": "Canva", "photo_url": "https://speakers.webdirections.org/photos/photo/4468f3b2-e078-443e-8b4a-1aa91e6364b3?v=1777849914125"}]}]}, {"name": "Leadership", "sessions": [{"id": "8e52cb75-7a93-447a-85bd-f3f939d8397f", "title": "Beyond Silicon Valley: Building AI Governance on the Fair Go Principle", "description": "Responsible AI isn\u2019t culturally neutral. American AI development embeds distinctly American values \u2014 individual liberty, technological solutionism, and winner-takes-all competition. But what happens when these values clash with Australian cultural principles that prioritise collective welfare, egalitarianism, and the \u201cfair go\u201d?\r\n\r\nCurrent AI governance frameworks \u2014 largely imported from Silicon Valley \u2014 often perpetuate values misaligned with Australian regulatory expectations and social norms. The Mathpath and recovering American Aubrey Blanche draws on principles of mateship, pragmatic skepticism, and community-oriented thinking, in this presentation that introduces a distinctly Australian responsibility framework for AI implementation. Rather than treating AI risks as individual consumer choices or market failures, this framework positions AI governance as a collective responsibility \u2014 where technology serves the common good, ensures equitable access, and earns trust through demonstrated fairness rather than assumed benevolence.", "type": "talk", "track": "Leadership", "start_time": "12:30", "end_time": "12:55", "duration_minutes": 25, "location": "Swinburne Studio", "speakers": [{"full_name": "Aubrey Blanche", "job_title": "Founder", "employer": "The Mathpath", "photo_url": "https://speakers.webdirections.org/photos/photo/7b0d4c27-0ae8-46d5-95e0-965adef9bc20?v=1774136311455"}]}, {"id": "193d8c66-6a5b-40bc-a2a9-5811afd99661", "title": "Stop Blocking, Start Building: Rethinking Governance for the Agentic Era", "description": "As AI moves from \"chat\" to \"act,\" the risk surface is exploding. Traditional governance is too slow, too onerous, and often looks in the wrong places. Join this session to learn how to:\r\n\r\n- Identify the 3 fatal flaws of applying legacy governance to autonomous agents.\r\n- Implement the GRASP Framework: A 5-part approach (Governance, Reach, Agency, Safeguards, Potential Impact) to categorizing agentic risk.\r\n- Leverage Observability as Governance: How real-time visibility replaces manual approvals to keep innovators moving without breaking the enterprise.", "type": "talk", "track": "Leadership", "start_time": "13:00", "end_time": "13:25", "duration_minutes": 25, "location": "Swinburne Studio", "speakers": [{"full_name": "Hamish Songsmith", "job_title": "Founder", "employer": "ryora.ai", "photo_url": "https://speakers.webdirections.org/photos/photo/b12e7e8e-75ac-475e-b291-f9910bfea11d?v=1774136279055"}]}, {"id": "377b9ced-16f0-426f-9c03-a0cd2e4b329b", "title": "Having your cake and eating it: An implementation guide for privacy with AI", "description": "Everyone wants privacy, but the best models require you to give up control of your data. What options are there for keeping data private but while still embracing the promise of AI?\r\n\r\nIn this talk we'll take a practical, experience based look at options ranging from private models, trusted execution environments, differential privacy, multi-part computation, federated learning and homomorphic encryption (and yes I'll explain what these are!)\r\n\r\nI'll explain what each is, when they are useful and give my personal experience with running some of these in production (the ones that made it that far!) over the past 4 years.", "type": "talk", "track": "Leadership", "start_time": "13:30", "end_time": "13:55", "duration_minutes": 25, "location": "Swinburne Studio", "speakers": [{"full_name": "Nick Lothian", "job_title": "Staff Engineer", "employer": "N/A", "photo_url": "https://speakers.webdirections.org/photos/photo/9448e7b6-e8dc-4988-9437-a2859ccdee96?v=1774136205199"}]}, {"id": "84770edf-b713-40c6-a44c-e31c3f81d735", "title": "Panel: Governance & Ethics", "description": "A moderated conversation closing the Governance & Ethics session. Andrew Murphy leads a discussion with Aubrey Blanche, Hamish Songsmith, and Nick Lothian on how principles, operational frameworks, and hands-on privacy implementation come together in practice.", "type": "panel", "track": "Leadership", "start_time": "14:00", "end_time": "14:25", "duration_minutes": 25, "location": "Swinburne Studio", "speakers": [{"full_name": "Andrew Murphy", "job_title": "CEO (Chief Everything Officer.)", "employer": "Debugging Leadership", "photo_url": "https://speakers.webdirections.org/photos/photo/1b33891f-3253-4a6c-9a96-4334beedf25a?v=1776251588737"}, {"full_name": "Aubrey Blanche", "job_title": "Founder", "employer": "The Mathpath", "photo_url": "https://speakers.webdirections.org/photos/photo/7b0d4c27-0ae8-46d5-95e0-965adef9bc20?v=1774136311455"}, {"full_name": "Hamish Songsmith", "job_title": "Founder", "employer": "ryora.ai", "photo_url": "https://speakers.webdirections.org/photos/photo/b12e7e8e-75ac-475e-b291-f9910bfea11d?v=1774136279055"}, {"full_name": "Nick Lothian", "job_title": "Staff Engineer", "employer": "N/A", "photo_url": "https://speakers.webdirections.org/photos/photo/9448e7b6-e8dc-4988-9437-a2859ccdee96?v=1774136205199"}]}, {"id": "38c12ec5-da3d-4491-8a32-27eca1e14fd0", "title": "Regulatory AI: Building Intelligent Compliance into Financial Operating Systems", "description": "Regulatory AI represents the next evolution of financial systems, where compliance, risk, and governance are no longer external constraints, but embedded, intelligent capabilities within the platform itself.\r\n\r\nThis session showcases the design and implementation of a Regulatory AI framework developed across the Accelerate Funding Group and the Finteon OS platform. The approach integrates AI-driven data ingestion, real-time decisioning, and adaptive compliance models to support private lending, capital structuring, and broker ecosystems.\r\n\r\nBy combining structured financial data, unstructured regulatory inputs, and AI orchestration layers, the platform enables:\r\n\r\nAutomated compliance alignment (ASIC/APRA-aware)\r\n\r\nIntelligent product matching and credit assessment\r\n\r\nReal-time risk monitoring and auditability\r\n\r\nScalable broker and funder workflows\r\n\r\nThe result is a shift from reactive compliance to proactive, embedded regulatory intelligence, thereby unlocking faster deal execution, reduced risk, and new monetisation pathways in private credit markets.", "type": "talk", "track": "Leadership", "start_time": "15:30", "end_time": "15:55", "duration_minutes": 25, "location": "Swinburne Studio", "speakers": [{"full_name": "Theo Adis", "job_title": "AI Systems Architect | Financial Operating Systems (Fintech)", "employer": "Accelerate Funding Group", "photo_url": "https://speakers.webdirections.org/photos/photo/23226729-c0e2-4692-a1a6-98704a038f43?v=1774136172856"}]}, {"id": "8dea2213-854e-45d4-a926-21adb2bd29ae", "title": "19Cabs: 1115 drivers, 500 customers, 90 days from idea \u2014 and why we still had to stop and rethink AI", "description": "Balram Singh is a frontend-focused full-stack engineer and architect with over a decade of experience building web and mobile applications. He currently works at Publicis Sapient in Australia, delivering large-scale digital solutions across enterprise clients.\r\nHis current focus is on applying AI beyond development speed \u2014 using real production data to solve marketplace challenges such as fake bookings, cancellation patterns, and driver\u2013ride matching. He is particularly interested in how small teams can leverage AI to build, operate, and scale complex systems traditionally requiring much larger organizations.", "type": "talk", "track": "Leadership", "start_time": "16:00", "end_time": "16:25", "duration_minutes": 25, "location": "Swinburne Studio", "speakers": [{"full_name": "Balram Singh", "job_title": "AI architect", "employer": "Publicis Sapient", "photo_url": "https://speakers.webdirections.org/photos/photo/0f5d81ad-cb5e-4742-a4e0-af28e08d45f6?v=1774136177722"}]}, {"id": "e6550831-32f2-4ba1-9d95-ddb7527d19bd", "title": "Enabling Safe AI Experimentation for Non-Technical Founders", "description": "Inga Pflaumer shares how a pre-seed startup without technical leadership was able to quickly build and iterate on their product using AI without sacrificing safety, focusing on setting up the right foundations and lightweight guardrails so non-technical founders could experiment independently while staying within secure and scalable boundaries.\r\n\r\nThe result was a team able to move fast with confidence, turning AI from a risky shortcut into a reliable way to build.", "type": "talk", "track": "Leadership", "start_time": "16:30", "end_time": "16:55", "duration_minutes": 25, "location": "Swinburne Studio", "speakers": [{"full_name": "Inga Pflaumer", "job_title": "Consulting CTO", "employer": null, "photo_url": "https://speakers.webdirections.org/photos/photo/dcd0092c-f257-49c5-ba66-1d34c8d3715d?v=1777412874030"}]}, {"id": "95401c3b-ce1b-4993-b6bd-a1f0d76080df", "title": "Panel: Case Studies", "description": "A moderated conversation closing the L2 Case Studies session. AJ Fisher leads a discussion with Theo Adis, Balram Singh, and Inga Pflaumer about what it really took to ship AI into live businesses across regulated finance, transport, and agent tooling.", "type": "panel", "track": "Leadership", "start_time": "17:00", "end_time": "17:25", "duration_minutes": 25, "location": "Swinburne Studio", "speakers": [{"full_name": "AJ Fisher", "job_title": "Technologist & Writer", "employer": "ajfisher.me", "photo_url": "https://speakers.webdirections.org/photos/photo/e3cfdc31-2952-4db1-8124-21bf9d6bbba8?v=1774136217976"}, {"full_name": "Theo Adis", "job_title": "AI Systems Architect | Financial Operating Systems (Fintech)", "employer": "Accelerate Funding Group", "photo_url": "https://speakers.webdirections.org/photos/photo/23226729-c0e2-4692-a1a6-98704a038f43?v=1774136172856"}, {"full_name": "Balram Singh", "job_title": "AI architect", "employer": "Publicis Sapient", "photo_url": "https://speakers.webdirections.org/photos/photo/0f5d81ad-cb5e-4742-a4e0-af28e08d45f6?v=1774136177722"}, {"full_name": "Inga Pflaumer", "job_title": "Consulting CTO", "employer": null, "photo_url": "https://speakers.webdirections.org/photos/photo/dcd0092c-f257-49c5-ba66-1d34c8d3715d?v=1777412874030"}]}]}, {"name": "AI Engineering", "sessions": [{"id": "a68b4250-5485-4f43-8ce3-08500bc8a01b", "title": "Evaluation Precedes Evolution: Rubrics as the Load-Bearing Infrastructure of Self-Improving Agents", "description": "The 2025\u20132026 wave of \"self-evolving\" agents \u2014 prompt-tuning loops, memory accumulation, agent swarms, GEPA, ReasoningBank \u2014 share a structure that is sometimes lost in the jargon: every one of them is hill-climbing on a judge. The judge is the fitness function. When it's sharp, the agent compounds. When it's vague, the loop drifts confidently in the wrong direction.\r\n\r\nThis talk argues that rubrics, not prompts or scaffolds, are the load-bearing infrastructure of agent improvement. We'll walk through three concrete failures from recent work: prompt optimizers that regressed without rollback (OpenAI), memory systems that hurt performance as they grew (ReasoningBank), and 18 months of capability gains that delivered almost no reliability gain (Princeton). All three share a root cause: the rubric was the bottleneck, and nobody was looking at it.\r\n\r\nThen we'll build one. Five principles for a rubric that can actually drive evolution \u2014 stack deterministic before semantic, score failures explicitly, measure beyond accuracy, version the rubric itself, keep it cheap. You'll leave with a checklist you can apply to your next agent before you ship a single optimization loop.\r\n\r\nIn collaboration with Pouya Ghiasnezhad Omran.", "type": "talk", "track": "AI Engineering", "start_time": "12:30", "end_time": "12:48", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Tanya Dixit", "job_title": "Forward Deployed Engineer", "employer": "Google", "photo_url": "https://speakers.webdirections.org/photos/photo/45acc7e8-f224-4635-855e-924390d1604f?v=1778615102339"}]}, {"id": "2d53e279-d883-4038-bc12-9b2594324b15", "title": "Beyond Forgetful Bots: Architectural Patterns for Persistent, Proactive Claw-Style AI Agents", "description": "Most AI agents are reactive chatbots\u2014great for one-off queries, but they reset, forget, and lack initiative, failing in real-world use like personal assistants or autonomous workflows.\r\n\r\nThis talk dives into the battle-tested architecture of Claw-family agents (OpenClaw and lightweight forks like NanoClaw, PicoClaw, TinyClaw, IronClaw, ZeroClaw), which power persistent, proactive systems that run 24/7 on your devices. Drawing from real implementations, we'll unpack core patterns:\r\n\r\nHub-and-Spoke Separation: A stateless gateway routes inputs (messages, heartbeats, cronjobs, hooks, webhooks) while adapters normalize diverse channels (WhatsApp, Discord) and enforce typed protocols/security handshakes.\r\nEphemeral vs. Persistent State: Transient context (system prompts, recent interactions) stays token-efficient; durable memory (append-only logs + curated facts) uses hybrid retrieval (semantic + keyword) with flush safeguards to survive compaction/restarts.\r\nRuntime Loop & Extensibility: RPC streaming for task queuing/execution; plugin discovery (tools, providers, memories) and Markdown-based skills (SOPs) enable hot-loading without recompiles, plus multi-agent delegation for collaboration.\r\nSecurity Boundaries: Defense-in-depth with network isolation, sandboxed sessions (e.g., Docker for untrusted chats), identity pairing, and safeguards against injection/poisoning.\r\nProactivity and Deployment: Inputs trigger autonomous actions; architectures span local native, VPS/Docker, or cloud for low-resource edge devices.\r\nWhether forking OpenClaw or building similar agents, this playbook delivers insights on separation of concerns, model-agnostic brains, and tradeoffs for scalable, secure AI that feels truly alive\u2014beyond single sessions.", "type": "talk", "track": "AI Engineering", "start_time": "12:50", "end_time": "13:08", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Navan Tirupathi", "job_title": "CTO , Architecture and AI Expert", "employer": "Arivminds", "photo_url": "https://speakers.webdirections.org/photos/photo/2495567c-dc5d-4584-b80e-dda5f7b67384?v=1774136289335"}]}, {"id": "bb1975f2-b535-403a-894f-99d3448c9fa9", "title": "Shipping Sandboxed Workers for Notion Agents", "description": "In this talk, we will share how we built a platform at Notion that allows developers to extend AI agents with custom code. The system enables developers to write small programs that give their agents access to tools such as internal APIs and external services.\r\n\r\nWe will focus on the engineering decisions that made the first version practical to ship: what we chose to build, what we deliberately left out, and the operational and safety constraints that shaped the design.\r\n\r\nWe will walk through the developer experience from local development through deployment and execution, and discuss how we approached packaging, distribution, and running user-supplied code in an isolated environment.\r\n\r\nFrom there, we will explore the boundaries required to safely support untrusted tool code in production, including capability constraints, governance around who can manage and attach extensions, and the guardrails needed to keep agent-driven execution safe and observable.\r\n\r\nFinally, we will share lessons from bringing the system out of its early stages, including the operational challenges we encountered and the changes we made along the way.", "type": "talk", "track": "AI Engineering", "start_time": "13:10", "end_time": "13:28", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Adam Hudson", "job_title": "Software Engineer", "employer": "Notion", "photo_url": "https://speakers.webdirections.org/photos/photo/28852ce6-14f5-4f83-8b2a-e9751f9aab60?v=1774136228447"}]}, {"id": "de8657a0-b97d-48cf-885c-afa7b3cabb76", "title": "Close your agentic loop", "description": "Every time you've told an agent it broke the layout of your website, output the wrong schema or failed an invariant - you are the feedback loop. The teams achieving the best outcomes right now are focused on building better systems: automated feedback that allows agents to check their own work. Join to learn what closed-loop design looks like, and how you can build real leverage.", "type": "talk", "track": "AI Engineering", "start_time": "13:30", "end_time": "13:48", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Moss Ebeling", "job_title": "Head of AI Engineering", "employer": "Optiver Asia Pacific", "photo_url": "https://speakers.webdirections.org/photos/photo/e619ea60-63a6-48a3-9e2b-c88190f2a263?v=1774258090396"}]}, {"id": "6efff0dd-3cba-40b7-9b29-11321be7b096", "title": "How Many Agents Are Too Many? The Hidden Cost of Multi-Agent Systems", "description": "Multi-agent systems promise scalability and smarter reasoning\u2014but in production, more agents often mean more cost, latency, and failure. This talk shares real-world engineering lessons, metrics, and architectural trade-offs to help you decide when multi-agent designs add value\u2014and when a simpler approach performs better.", "type": "talk", "track": "AI Engineering", "start_time": "13:50", "end_time": "14:08", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Anannya Roy Chowdhury", "job_title": "GenAI Developer Advocate", "employer": "AWS", "photo_url": "https://speakers.webdirections.org/photos/photo/c3534f0b-dc48-4b9e-b4bc-b4ea9c1518a6?v=1774136301235"}]}, {"id": "ae417b14-ec40-4352-ba71-9acde0c99d72", "title": "Kill the God Agent", "description": "Your multi-agent system probably has one orchestrator with access to every tool, every database, every API. If that agent gets injected, the entire toolchain is compromised. Guardrails won't save you. In this session, learn three architectural patterns that move agent security from hope to proof: how to isolate agent capabilities so no single agent holds all the keys, how to scope authorization per task using cryptographic tokens that survive prompt injection, and how to enforce policies outside the LLM using a formally verified engine that intercepts actions in microseconds. Walk away with patterns you can apply to your agent architecture this week.", "type": "talk", "track": "AI Engineering", "start_time": "14:10", "end_time": "14:28", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Adesh Gairola", "job_title": "Co-founder & CTO", "employer": "raxIT Labs", "photo_url": "https://speakers.webdirections.org/photos/photo/4b01fc40-3a8a-437e-abdc-021aaad8e655?v=1780314597896"}]}, {"id": "c9667f3a-9cad-4df9-9ca5-2facc06e8207", "title": "Agent Observability: Monitoring and Understanding Agents at Internet Scale", "description": "Agent usage is exploding (if you haven't noticed) with an unprecedented transformation in the activities of both developers and other roles creating enormous volumes of new autonomous, dynamic decision making programs that can do extraordinary things but also hallucinate, misunderstand and in the worst case cause real damage.\r\n\r\nIn this talk I'll discuss Google's broad approach to figuring out what it is that agents are doing: what actions they are taking, how risky they are, what data is necessary to make good decisions, and how we can scale our approach to an enterprise the size of Google through automated monitoring and policy. I'll also discuss how we've been tackling the fundamental and critical problem of how to achieve both speed and safety.", "type": "talk", "track": "AI Engineering", "start_time": "15:30", "end_time": "15:48", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Daniel Nadasi", "job_title": "Principal Engineer", "employer": "Google", "photo_url": "https://speakers.webdirections.org/photos/photo/dbb3f2e9-1c47-4553-b239-aafed793cfbc?v=1774136274053"}]}, {"id": "924ae0be-d390-45af-b60b-ff7c0120fac0", "title": "Our AI Hallucinated in Production: How We Fixed It With Evals", "description": "We shipped one of REA Group\u2019s first generative AI features to production: Property Highlights, which turns long real-estate listings into three skimmable takeaways. The demo was easy; real traffic wasn\u2019t\u2014hallucinations showed up in front of real users.\r\n\r\nThis talk covers how we built an evaluation stack to launch safely at scale. Basic guardrails (three bullets, length limits) didn\u2019t catch the failures that mattered: made-up features, off-brand tone, and useless copy. We built a review tool for side-by-side prompt/model testing, defined a rubric for factuality, usefulness, and language quality, and scaled it with an LLM-as-judge calibrated to expert reviews to score thousands of listings daily. We then tied evals to real user feedback and business metrics, including a 10% engagement lift.\r\n\r\nYou\u2019ll get a practical pipeline and a repeatable way to iterate on LLM features using evals, not vibes.", "type": "talk", "track": "AI Engineering", "start_time": "15:50", "end_time": "16:08", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Yicheng Guo", "job_title": "Senior Machine Learning Engineer", "employer": "REA Group", "photo_url": "https://speakers.webdirections.org/photos/photo/a880e588-7db7-4359-a9eb-615ad75d9fcc?v=1774136270979"}]}, {"id": "2c0743b7-af39-4199-8c99-fafccbb4d58d", "title": "The Application Layer Is the New Research Lab", "description": "In the pre-genAI era, vertical product teams handed insights to a separate R&D group, who shipped a new model two quarters later. That handoff is now a bug. Agentic systems are built from dozens of model calls, judges, tools, and harness decisions, and every one of those is a hyperparameter. The product surface and the training surface are the same surface. This talk argues that every vertical AI company is now its own applied research lab. I walk through what that function actually ships (custom judges, scenario benchmarks, data flywheels, harness tuning), where the thesis breaks (most domains are not Cursor), and how to staff for it without losing engineering velocity.", "type": "talk", "track": "AI Engineering", "start_time": "16:10", "end_time": "16:28", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Abdul Karim", "job_title": "Applied AI Scientist", "employer": null, "photo_url": "https://speakers.webdirections.org/photos/photo/1e3afd04-a64a-444a-9c29-76d954455028"}]}, {"id": "83e651e5-cccf-4e3b-b345-9400c2ad999a", "title": "Orbital Lasers vs For Loops: Economically Matching Models to Tasks", "description": "Most developers pick their AI model the same way: use the biggest, smartest one available for everything. Bash script? Opus. Dockerfile? Whatever's at the top of the dropdown. Then they hit their usage limits halfway through the day and lose the productivity gains they were chasing. After too many cases of my workflow pausing because my Claude subscriptions limit, I started asking a different question: what model does this task actually need? The answer, for a surprising number of daily tasks, was something far smaller, faster, and cheaper.\r\n\r\nThis talk shares a practical framework for model selection built from real development work across cloud infrastructure, scripting, code generation, and documentation. I'll walk through concrete comparisons across model tiers \u2014 from frontier models through mid-range options down to lightweight and even local models \u2014 covering output quality, speed, cost, and the dimension most benchmarks ignore: actual impact on developer velocity. You'll walk away with a mental model for matching tasks to appropriate tiers, an honest look at where cheap models genuinely fall short, and a case for why thoughtful model selection is an engineering discipline, not just a cost optimisation exercise.", "type": "talk", "track": "AI Engineering", "start_time": "16:30", "end_time": "16:48", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Stephen Sennett", "job_title": "AWS Community Hero & Lead Consultant at V2 AI", "employer": "V2 AI", "photo_url": "https://speakers.webdirections.org/photos/photo/94d3fb30-ac78-493e-8529-163ecf6e63f9?v=1774136268298"}]}, {"id": "0599f7f9-dfe3-4dbb-9b72-3184e5b5af9e", "title": "Your AI Can\u2019t Engineer (Yet)", "description": "Large language models excel at code\u2014but engineering isn't just code. When you ask an AI to calculate short-circuit currents per IEC 60909 or size a pavement per Austroads 2022, you're asking it to operate outside its training distribution. The result: confident answers that miss unit conversions, ignore standard-specific constraints, and fail the \"gotchas\" that trip up junior engineers.\r\n\r\nAt Aurecon, a multinational engineering consultancy, we found that two-thirds of project rework stems from controllable errors\u2014dimensional mistakes, specification mismatches, standards compliance failures. These are exactly the errors AI should catch. But how do you know if your AI assistant is actually reliable on engineering tasks?\r\n\r\nThis talk introduces aecbench, an open benchmark suite born from Aurecon's quality engineering practice. With tasks across 12 engineering disciplines\u2014electrical, civil, structural, geotechnical, and more\u2014it maps the capability space AI needs to inhabit: deterministic calculations with standards compliance, mixed problems requiring judgment, and verification workflows that catch errors before they become rework.\r\n\r\nBut benchmarks aren't just for measurement. Each task is an environment of experience\u2014a structured space where agents learn what \"correct\" means in engineering. Deterministic tasks provide dense reward signals. Complexity tiers enable curriculum learning. \"Gotchas\" become adversarial scenarios that force understanding over pattern matching.\r\n\r\nI'll showcase results comparing frontier models, custom agentic harnesses, and early RL fine-tuning experiments on real engineering tasks\u2014plus how the community can contribute challenges to the open benchmark and run agents on the private leaderboard.", "type": "talk", "track": "AI Engineering", "start_time": "16:50", "end_time": "17:08", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Theodoros Galanos", "job_title": "Generative AI Leader", "employer": "Aurecon", "photo_url": "https://speakers.webdirections.org/photos/photo/9490204f-a75e-4b8d-a7d9-4455c2f3aed9?v=1774484668070"}]}, {"id": "d5c78686-1a5b-49aa-9e56-0b123f70bf06", "title": "Flue: The Agent Harness Framework, at Cloudflare", "description": "What [Flue](https://flueframework.com) is and how it's being used at Cloudflare and elsewhere.\r\n\r\nFlue is a programmable, open source agent harness, able to represent any autonomous agent or workflow, from simple chatbots to entire coding platforms.\r\n\r\nWe'll will touch on the rapidly growing world of agent harnesses in general, and how Flue fits into this landscape. As well as a framework exploration, we'll discuss how companies have been using Flue, including how we're using it at Cloudflare.", "type": "talk", "track": "AI Engineering", "start_time": "17:10", "end_time": "17:28", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Michael Hart", "job_title": "Senior Principal Engineer", "employer": "Cloudflare", "photo_url": "https://speakers.webdirections.org/photos/photo/a534e7f8-1054-4aea-bdc7-6ce269eb0f9e?v=1779783721435"}]}]}]}, {"date": "2026-06-04", "label": "Thursday June 4, 2026", "tracks": [{"name": "Keynote", "sessions": [{"id": "24ce6cdc-6ffc-4b67-ac90-5b9dfaa9baa4", "title": "Welcome \u2014 Day 2", "description": "Welcome back to day two of AI Engineer, another day full of amazing talks and conversation.", "type": "housekeeping", "track": "Keynote", "start_time": "09:00", "end_time": "09:05", "duration_minutes": 5, "location": "Cinema 1", "speakers": [{"full_name": "John Allsopp", "job_title": null, "employer": null, "photo_url": "https://speakers.webdirections.org/photos/photo/6d9925a3-96dc-47c8-bb7e-2643e2a0ba56?v=1776285112228"}]}, {"id": "bd68170e-e998-4efc-8058-9065d5b824f8", "title": "Keynote", "description": "", "type": "keynote", "track": "Keynote", "start_time": "09:10", "end_time": "09:40", "duration_minutes": 30, "location": "Cinema 1", "speakers": [{"full_name": "Jeremy Howard", "job_title": "Founding CEO & Co-founder", "employer": "Answer.AI & fast.ai", "photo_url": "https://speakers.webdirections.org/photos/photo/046c25e2-e4dc-4308-ae5c-2d21d9d88d1b?v=1774136305840"}]}, {"id": "cc043bba-6d57-4082-ae3c-75045603c32b", "title": "Craft in the Time of Agents", "description": "You feel more productive than you\u2019ve ever been. You put on the Iron Man suit and now you\u2019re building things in hours that used to take weeks. And you\u2019re exhausted by Wednesday. The craft that used to sustain you \u2014 the flow of writing code, the satisfaction of making something work \u2014 has given way to a middle loop of supervisory engineering: directing, evaluating, and correcting AI output. You\u2019re getting more done while enjoying it less, and that\u2019s a tension worth navigating. If the system is producing more output while eroding joy, that\u2019s not a you problem, it\u2019s a system design problem.\r\n\r\nDrawing from her recently completed Masters research on AI\u2019s impact on software engineering and conversations with practitioners and researchers at the frontier of this shift, Annie explores why this transition hits so differently for those entering the industry, those deep in it, and those who haven\u2019t written code in years \u2014 and why who thrives most comes down to mindset, not circumstance. The good news is, that\u2019s within your reach.\r\n\r\nThis talk offers a lens to see your own situation clearly, and a path through it. Joy and pride in work don\u2019t happen by accident. They\u2019re system outcomes. And we can engineer the conditions for them.", "type": "keynote", "track": "Keynote", "start_time": "09:40", "end_time": "09:58", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Annie Vella", "job_title": "Distinguished Engineer", "employer": "Westpac New Zealand", "photo_url": "https://speakers.webdirections.org/photos/photo/55e03617-562b-4425-a628-7154284e5979?v=1774136309020"}]}, {"id": "b1f400a3-1d68-4146-98c5-53bc92c00bce", "title": "What If You Never Needed an API Key Again? Building a Mesh LLM From Spare Compute", "description": "", "type": "keynote", "track": "Keynote", "start_time": "10:00", "end_time": "10:20", "duration_minutes": 20, "location": "Cinema 1", "speakers": [{"full_name": "Mic Neale", "job_title": "Principal Engineer", "employer": "Block", "photo_url": "https://speakers.webdirections.org/photos/photo/72d2b31f-df01-4820-b76b-65fa8b553ecf?v=1774136313775"}]}, {"id": "ea1aae09-9f95-451b-b4ef-8e431f3c50e5", "title": "Towards Long-Horizon Tasks", "description": "This talk argues that without a deliberate focus on long horizon tasks, even the most impressive models will remain brittle and unreliable for real world applications. Short form benchmarks and isolated prompts cannot capture the complexity of extended reasoning, planning, and execution that real world problems demand. When models lack the ability to maintain coherence across hundreds or thousands of steps, they fail in subtle but critical ways: losing track of sub goals, failing to recover from errors, or drifting away from the original objective. \r\n\r\nTo address this, the talk proposes a new framework for measuring and training long horizon capabilities, including explicit mechanisms for sub goal setting, robust error recovery, and sustained persistence over extended timeframes. These are not mere incremental improvements but fundamental shifts in how we design and evaluate AI systems.", "type": "talk", "track": "Keynote", "start_time": "10:20", "end_time": "10:38", "duration_minutes": 18, "location": "", "speakers": [{"full_name": "Zixuan Li", "job_title": "Head of Z.ai", "employer": "Z.ai", "photo_url": "https://speakers.webdirections.org/photos/photo/574dd643-d069-46d4-9d9f-1bf09d2b1652?v=1780355213516"}]}, {"id": "c40ced03-f774-49c3-bc3b-9284fc989d1e", "title": "Morning keynote outro", "description": "", "type": "housekeeping", "track": "Keynote", "start_time": "10:50", "end_time": "10:55", "duration_minutes": 5, "location": "Cinema 1", "speakers": [{"full_name": "John Allsopp", "job_title": null, "employer": null, "photo_url": "https://speakers.webdirections.org/photos/photo/6d9925a3-96dc-47c8-bb7e-2643e2a0ba56?v=1776285112228"}]}]}, {"name": "Hallway", "sessions": [{"id": "de3af587-73f6-4188-9283-989804b02ba4", "title": "Build Agent-Powered Workflows on Notion Developer Platform", "description": "Notion\u2019s Developer Platform gives developers and coding agents the building blocks to programmatically build on Notion. Connect to external systems, bring context into a shared workspace, and take permissioned actions across your tool stack.\r\n\r\nWe\u2019ll show what\u2019s possible with the core primitives: the CLI (ntn), Workers (Notion-hosted custom code), and the External Agent API (bring external agents into Notion as native workspace participants). You\u2019ll see how these pieces fit together to create reliable, governed workflows where every action and output lands back in Notion for team visibility, review, and follow-through.", "type": "talk", "track": "Hallway", "start_time": "11:15", "end_time": "11:35", "duration_minutes": 20, "location": "Gandel Digital Future Lab", "speakers": [{"full_name": "Esti Frischling", "job_title": "GTM Lead APAC", "employer": "Notion", "photo_url": "https://speakers.webdirections.org/photos/photo/34dcbc01-ee2c-4f93-a493-b74beab8e8f2?v=1779688182690"}]}, {"id": "41ca9dd6-13fc-46e6-bf07-5558b29725e7", "title": "Why Engineering Velocity Still Breaks", "description": "In 2026, most engineering teams have the frameworks, the cloud, and the AI tooling. Velocity still breaks. It breaks between commit and production - in the deployment systems, the infra tickets that sit in someone's backlog while the feature waits. This session is for engineering leaders who've modernised the stack but still can't answer why shipping feels harder than it should. We'll examine where delivery actually stalls in modern web stacks, whether managed platforms and AI are genuinely fixing the problem or just masking fragile foundations, and what it looks like when the layer between development and production finally stops being a liability.", "type": "talk", "track": "Hallway", "start_time": "11:40", "end_time": "12:00", "duration_minutes": 20, "location": "Gandel Digital Future Lab", "speakers": [{"full_name": "Aldo Schumann", "job_title": "Developer Success Engineer", "employer": "Vercel", "photo_url": "https://speakers.webdirections.org/photos/photo/bfdb4005-61cc-4ebb-bf07-dd3a28cbd538?v=1778197219738"}]}, {"id": "a3bfa109-6f61-414e-bcb3-bd3068e2562f", "title": "Stop Rebuilding Authorisation: Accelerating AI Agent Development", "description": "The demand for AI agents that take real action is immense. However, developers keep hitting a frustrating bottleneck: building the complex authorisation logic required to let agents act on behalf of users. Rebuilding custom authorisation for every new agent capability creates endless boilerplate, technical debt, and a massive integration mess. Instead of focusing on innovative AI features, engineering teams waste cycles reinventing access control and approval workflows. This session is all about maximising developer efficiency and eliminating rework. Discover how leveraging Auth0 for AI Agents handles the heavy lifting of dynamic permissions and seamless Human-in-the-Loop controls out of the box. We will explore how to stop building auth from scratch so you can ship high-impact AI agents with significantly less friction.", "type": "talk", "track": "Hallway", "start_time": "14:10", "end_time": "14:30", "duration_minutes": 20, "location": "Gandel Digital Future Lab", "speakers": [{"full_name": "Daizen Ikehara", "job_title": "Principal Developer Advocate", "employer": "Auth0", "photo_url": "https://speakers.webdirections.org/photos/photo/cd30697f-0187-4bd8-8668-54b99c5ad720?v=1775180560942"}, {"full_name": "Kevin Akermanis", "job_title": "Senior Developer Presales Architect", "employer": "Auth0", "photo_url": "https://speakers.webdirections.org/photos/photo/9e6ebe6b-f768-43b4-9915-7505ec7146ee?v=1778826618964"}]}]}, {"name": "Software Engineering", "sessions": [{"id": "0716c074-bc59-47ba-a2b2-7fd916c0cad5", "title": "Spec driven AI development - A Real World Perspective", "description": "AI demos are easy. Production systems are not.\r\n\r\nIn this session, we move beyond hype and explore what it actually takes to deliver AI systems that work in the real world. Not experiments. Not playgrounds. Proper, spec-driven, commercially accountable systems.\r\n\r\nYou will see how clear specifications, structured prompts, testing frameworks and disciplined engineering turn AI from a novelty into a reliable asset. We will cover what goes wrong when you skip the spec, how to avoid costly rework, and how to design AI systems that survive compliance, security reviews and real users.\r\n\r\nIf you are building AI for clients, boards or production environments, this session will challenge your assumptions and give you a practical blueprint.", "type": "talk", "track": "Software Engineering", "start_time": "12:00", "end_time": "12:18", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Nick Beaugeard", "job_title": "Managing Director", "employer": "Released Pty Ltd", "photo_url": "https://speakers.webdirections.org/photos/photo/2f39f126-55fc-40a3-ae02-c9d268733937?v=1774136284071"}]}, {"id": "54b9a2c6-b2f6-4639-9736-7a4f9ebc698c", "title": "Building SDKs in the Agentic Era", "description": "In the time it takes to train a frontier model, the open source libraries we rely on can undergo significant changes. This creates an ongoing delta between what an LLM coding agent suggests and what the best practices are, or what even works. For the team at Google DeepMind, this is an ongoing challenge as we publish both models and open-sourc
