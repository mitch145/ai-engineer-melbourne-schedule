e SDKs.\r\n\r\nThis talk will share some of the challenges that we, as SDK maintainers face, and we'll share some results from our experiments. We'll focus primarily on the \"training cutoff knowledge gap\", and how it is applicable for users and owners of open source projects, but we will also discuss some of the other challenges maintainers face in a world where producing code is trivial.", "type": "talk", "track": "Software Engineering", "start_time": "12:20", "end_time": "12:38", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Mark McDonald", "job_title": "Gemini Developer Experience", "employer": "Google DeepMind", "photo_url": "https://speakers.webdirections.org/photos/photo/627d5d34-2823-4420-9503-705ff6913b66?v=1774136215257"}]}, {"id": "de4cac0a-bd4e-41be-9104-49c8a3f8e32a", "title": "AGENTS.md is the wrong conversation", "description": "AGENTS.md started as a simple way to guide coding agents, but many teams are discovering that a default or poorly written one can actually make agents worse. Obvious facts, vague rules, outdated guidance, and generic instructions often confuse models more than they help. \r\n\r\nBut manually crafting it won\u2019t cut it once teams and organizations enter the picture. Because a single static file stops being enough. Agents need a harness that guides how they interpret context, what knowledge applies where, and which decisions carry authority. In this talk we\u2019ll explore why effective agent systems require structured context, hierarchy, and memory \u2014 and how building that harness is the real challenge of making AI agents work reliably inside engineering organizations.", "type": "talk", "track": "Software Engineering", "start_time": "12:40", "end_time": "12:58", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Jakub Riedl", "job_title": "Technical Founder", "employer": "ctx|", "photo_url": "https://speakers.webdirections.org/photos/photo/00cf9b1f-4acc-4067-9ba0-7235a129d82c?v=1774136245922"}]}, {"id": "fd14214b-c2d6-4141-aa9d-23215db9cafc", "title": "Engineering without reading code", "description": "In 2024 my team built 2 web-based Interactives for our Science Curriculum. In 2025 we built 50, in 2026 we expect to build over 100. In 2024 Engineers collaborated with Writers to build Interactives. In 2025 Writers built the Interactives and Engineers reviewed and deployed them. In 2026 we're getting Engineering out of the loop.\r\n\r\nWith AI we're writing more code than ever, and more and more non-Engineers are involved in building with code. It is not sustainable for a human to read and review every line of code. Even if we do human review, the volume is so large and the context is totally gone - we can't expect them to do a good job. So how can we feel safe? What techniques do we need to apply? What technologies do we build? How do we Engineer in a world where we no longer read code?\r\n\r\nIn this talk I'll go through our journey of building small low-risk software without human review. I'll talk about my experiments in building software without review, and the systems I'm building. I'll also talk about the systems we're using in production to drive high quality code and  anti-fragility through AI review. Then how I'm thinking about the future of work in Software Engineering, and whether human review will be a part of that.", "type": "talk", "track": "Software Engineering", "start_time": "13:00", "end_time": "13:18", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Ben Taylor", "job_title": "Product Engineering Team Lead", "employer": "Stile Education", "photo_url": "https://speakers.webdirections.org/photos/photo/598c6c41-3df0-4df4-a805-4d06cee2520c?v=1774136190227"}]}, {"id": "24b18eea-ca43-4d58-b69e-efa2f3c5bd9d", "title": "The Death of Documentation", "description": "For decades, documentation has been the \"sacred bridge\" between human intent and machine execution. Historically, this was born of necessity: when computer time was scarce, we had to document our plans perfectly before touching a terminal. But in the modern era, documentation has morphed into a static snapshot\u2014often serving more as marketing material than technical truth.\r\n\r\nNow, as we enter the age of AI-assisted development, the consumer of our code is changing. LLMs can read source code\u2014the ultimate source of truth\u2014with the same fluency as natural language. This talk draws on real-world experience building against rapidly evolving open-source systems to show why the future isn't about writing better manuals, but about embracing just-in-time understanding generated directly from the code.", "type": "talk", "track": "Software Engineering", "start_time": "13:20", "end_time": "13:38", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Josh Gillies", "job_title": "Senior Software Engineer", "employer": "Prefactor", "photo_url": "https://speakers.webdirections.org/photos/photo/707afc34-dab5-43fb-83d9-e05f3414143b?v=1774258092787"}]}, {"id": "05bd2b94-9602-472b-82c2-48c2cacb8771", "title": "Designing Inference-Native Systems", "description": "For a long time, the world has run on systems built on logic. You put something in, follow a set of rules, and you get an output. Now we have systems that can run on inference: systems that can update belief, decide, and act. That changes how we should think about building systems. We don't need to keep forcing everything into rigid workflows. We can start designing systems that are built around inference from the onset. This talk is a thought process on designing these systems, drawing from principles in human-computer interaction, mathematics, and software design.", "type": "talk", "track": "Software Engineering", "start_time": "13:40", "end_time": "13:58", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Sajjad Kamal", "job_title": "CEO", "employer": "OnSet Health", "photo_url": "https://speakers.webdirections.org/photos/photo/ab8772cb-01e7-4918-b1c8-7106f79a6cde?v=1778102496113"}]}, {"id": "3597a28e-f207-4af3-b9ea-2429c6f6b751", "title": "Agentic SAST: Building an AI Pipeline for Rule Synthesis and Root-Cause Vulnerability Analysis", "description": "Project Electrification is an agentic, AI-powered application security pipeline designed to eliminate vulnerabilities at their source.\r\nAutonomous agents scan large codebases, generate and execute custom SAST rules, and produce unified risk analytics through the ELK stack. Security engineers then convert these insights into SDK-level protections, ensuring the same classes of issues can\u2019t reappear across the organization\u2019s products.\r\nInstead of chasing findings, Electrification removes the root causes\u2014at scale.", "type": "talk", "track": "Software Engineering", "start_time": "15:00", "end_time": "15:18", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Danila Sashchenko", "job_title": "Security Engineer, previously Offensive Security Engineer", "employer": "TikTok", "photo_url": "https://speakers.webdirections.org/photos/photo/b6a8dbc1-e3ae-4742-9dac-859a05980770?v=1774136286710"}]}, {"id": "95c55704-e664-4457-ad96-a0542cb5c473", "title": "AI After an Apocalypse", "description": "Cloud outages used to mean your site went down, maybe you couldn't deploy. Just small unimportant stuff. Now an outage means you can't even write any code. And unreliable connections cause the same problems as ever - random cutoffs partway through, lost or incomplete work. The broken assumption remains that we are online all the time, and not sometimes sitting far away coding in a forest.\r\n\r\nThis session is about making the big models more fault-tolerant, and having a better time with the little ones. How to ensure LLMs don't burn a hole in your pocket, literally or otherwise. Probably impractical in the event of a real apocalypse, but helpful all the same.", "type": "talk", "track": "Software Engineering", "start_time": "15:20", "end_time": "15:38", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Simon Knox", "job_title": "Computer Programmer", "employer": "apartments.com.au", "photo_url": "https://speakers.webdirections.org/photos/photo/93dc627a-2651-4fac-b021-0a5c19a4671f?v=1774136212748"}]}, {"id": "0e7cddbf-7e05-47b1-8ced-d63ca6736081", "title": "Stop vibing your agents to production: applying ML discipline to agent development", "description": "When I joined my current team, it was a familiar pattern: 6-8 experiments over a year, each taking 10-12 weeks, 60-70% of the time burned on infrastructure, one thing in production held together with duct tape, and our entire agent lifecycle dependent on what our cloud provider made available in our region. The fix wasn't a new framework. It was an old playbook: ML engineering. Version artifacts like model checkpoints, define evaluators like loss functions, search hyperparameters systematically, and decouple your tooling from your cloud provider. The first experiment under this approach finished in 4 weeks, and other teams across the organisation started running their own experiments without us. In this talk, I'll walk through the methodology, the key trade-offs, and demo HoloDeck, the open-source distillation of everything I learned.", "type": "talk", "track": "Software Engineering", "start_time": "15:40", "end_time": "15:58", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Justin Barias", "job_title": "Lead AI Engineer", "employer": "Australian Government", "photo_url": "https://speakers.webdirections.org/photos/photo/5a4867e4-744e-4910-b0e3-960451db743d?v=1774136251029"}]}, {"id": "c4814775-18df-46bd-9cfc-df675cc9905f", "title": "Fully Automated Luxury Gay Space Engineering", "description": "Autocomplete is *so* 2023. Chatbots were already tedious by 2024. Running agents locally was cool... back in early 2025.\r\n\r\nThe future of engineering doesn't have a human in the coding loop at all.\r\n\r\nWhen it's within the AI's \u2014 rapidly growing \u2014 capabilities, *you* are the bottleneck in shipping code. How many PRs can you review? How many Claude terminals can you monitor at once before you lose your mind?\r\n\r\nI'll talk through our experiences building a fully automated maintenance loop at Stile Education, where we're scaling from 600k students in Australia to 6M across the US over the next 24 months. Issues from production are monitored, aggregated, ticketed, fixed, (increasingly) reviewed, and deployed without human involvement. Explain our conceptual models of how to build these systems, and highlight our hard won mistakes and lessons along the way.\r\n\r\nThen, I'll fumble awkwardly towards the broader implications for our industry: What does it look like to step back and engineer a system that produces software, rather than being a cog in that machine directly? How do we all begin to work *on* the business rather than working in it?", "type": "talk", "track": "Software Engineering", "start_time": "16:00", "end_time": "16:18", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Daniel Rodgers-Pryor", "job_title": "Head of Stile AI Labs", "employer": "Stile Education", "photo_url": "https://speakers.webdirections.org/photos/photo/f3bdc2a0-a6cd-4e70-9cd1-70dee995657f?v=1774136281585"}]}, {"id": "8586641c-b0fe-4048-8135-f297f1e139da", "title": "12TB of AI coding agent logs - what works, what fails", "description": "Three things matter for AI coding effectiveness: the tool, the codebase, the developer. When we look at the nuance of sessions, we can see patterns across all these - what works, what doesn't, what you can control, what you can't. I can't fix everything for you but I'll give you a few useful steps forward.", "type": "talk", "track": "Software Engineering", "start_time": "16:20", "end_time": "16:38", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "Dave Slutzkin", "job_title": "CEO", "employer": "Cadence", "photo_url": "https://speakers.webdirections.org/photos/photo/739eb498-bd22-4cba-a835-cf6de597a084?v=1774136197598"}]}, {"id": "f3d3d65b-41f2-4440-bc4f-c4871b7b5478", "title": "Slop is a standards problem", "description": "Your feed is full of warnings about an incoming tidal wave of AI slop. Unmaintainable code. Crushing tech debt. Anyone with a prompt and ten minutes shipping production code. The fear is real, but it misses what's actually going wrong.\r\n\r\nSlop happens when the standard isn't stated. AI drives for done. Without a bar to clear, done is all you get. The way through is configuration: writing the standard down, once, in a file the machine and the human can both point at.\r\n\r\nDavid makes the case that the same technology we fear will flood us with slop is the technology that can elevate the bar, if you set one. You'll leave with a simple framework to get started, a model for turning AI into a quality multiplier, and honest caveats about where this breaks down.", "type": "talk", "track": "Software Engineering", "start_time": "16:40", "end_time": "16:58", "duration_minutes": 18, "location": "Cinema 2", "speakers": [{"full_name": "David Lewis", "job_title": "Engineering Manager", "employer": "Nine Entertainment", "photo_url": "https://speakers.webdirections.org/photos/photo/ae248982-fee7-4d14-a137-84b1eaed7f8a?v=1778526321619"}]}]}, {"name": "Leadership", "sessions": [{"id": "c1f5da3b-4003-4e79-aa86-d212354d38f7", "title": "Not Everything Needs an LLM", "description": "I got frustrated. My support tickets kept getting routed to the wrong team. Every misroute added a day to resolution. I decided to fix it.\r\n\r\nThe obvious approach in 2024 was to throw the problem at an LLM. I knew that wasn\u2019t going to work. The overlap in team responsibilities made it impossible to write a concise prompt. Tokens would burn fast, accuracy would be unpredictable, and the whole thing would be fragile.\r\n\r\nSo I built Gata instead. It\u2019s an open source ticket router for Zendesk, and the core routing uses a fine-tuned BERT model trained on your organisation\u2019s own ticket history. LLMs do appear in the stack, but for the tasks they\u2019re actually good at: priority classification and ticket summarisation. The routing itself doesn\u2019t need one.\r\n\r\nThis talk walks through that decision-making process. How do you evaluate whether a problem actually needs an LLM? What signals tell you a fine-tuned classifier will outperform a general-purpose model? And how do you build something that gets more accurate over time rather than drifting with every prompt change?\r\n\r\nYou\u2019ll leave with a practical framework for matching automation problems to the right tool, and a concrete case study of what that looks like in production.", "type": "talk", "track": "Leadership", "start_time": "12:00", "end_time": "12:25", "duration_minutes": 25, "location": "Swinburne Studio", "speakers": [{"full_name": "Dave Hall", "job_title": "Principal Consultant", "employer": "Dave Hall Consulting", "photo_url": "https://speakers.webdirections.org/photos/photo/0b5b0118-75e8-4a3f-be8c-47c0ad5f8358?v=1774136210191"}]}, {"id": "c28ecc4a-512c-463a-8348-0eabd2c95113", "title": "The AI Tax and \"legal\" ways to minimise it", "description": "AI tools feel productive. That's the problem.\r\nA 2025 METR study found experienced developers were 19% slower using AI on their own codebases, yet believed they were 20% faster. I didn't need a study to tell me something was off. I could feel it: more code shipping, more bugs slipping through, reviewing functions I couldn't quite explain, and a growing sense that I was managing a workflow rather than doing engineering.\r\nThat's the AI tax. The hidden overhead that accumulates every time you prompt, verify, redirect, and re-contextualise. It doesn't show up in your commit count. It shows up in your cognitive load, your code familiarity, and eventually your production incidents.\r\nThis talk is about what that tax actually looks like day to day, why it's hardest to spot when you're most productive-feeling, and the practical strategies I've used to minimise it without throwing away the tools.", "type": "talk", "track": "Leadership", "start_time": "12:30", "end_time": "12:55", "duration_minutes": 25, "location": "Swinburne Studio", "speakers": [{"full_name": "Krishna kanth Mundada", "job_title": "Software Engineer", "employer": "Versent", "photo_url": "https://speakers.webdirections.org/photos/photo/239fc22f-59b1-40f7-aeb9-1e7cb47abbc4?v=1774136192682"}]}, {"id": "a5c632e9-6eb5-4e06-9f8d-652dbcc40031", "title": "Your engineers aren't afraid of AI. They're afraid of becoming junior again.", "description": "When you roll out AI coding tools, you expect pushback about job security and workflow disruption. What you get instead is something harder to fix: senior engineers watching AI produce in seconds what used to take them years to master.\r\n\r\nThis talk is about what's really driving quiet resistance in your team and what you can do about it.", "type": "talk", "track": "Leadership", "start_time": "13:00", "end_time": "13:25", "duration_minutes": 25, "location": "Swinburne Studio", "speakers": [{"full_name": "Andy Kelk", "job_title": "Fractional CTO", "employer": "Self Employed", "photo_url": "https://speakers.webdirections.org/photos/photo/d81683b0-6749-4d4c-8bfc-5a2b4e73b094?v=1774136240882"}]}, {"id": "dd137234-c9fb-47cd-925e-73d1ee567198", "title": "Panel: Engineering Reality", "description": "A moderated conversation closing the L3 Engineering Reality session. AJ Fisher leads a discussion with Dave Hall, Krishna Mundada, and Andy Kelk on when not to reach for an LLM, the real costs of AI in production, and what it means for engineering teams and careers.", "type": "panel", "track": "Leadership", "start_time": "13:30", "end_time": "13:55", "duration_minutes": 25, "location": "Swinburne Studio", "speakers": [{"full_name": "AJ Fisher", "job_title": "Technologist & Writer", "employer": "ajfisher.me", "photo_url": "https://speakers.webdirections.org/photos/photo/e3cfdc31-2952-4db1-8124-21bf9d6bbba8?v=1774136217976"}, {"full_name": "Dave Hall", "job_title": "Principal Consultant", "employer": "Dave Hall Consulting", "photo_url": "https://speakers.webdirections.org/photos/photo/0b5b0118-75e8-4a3f-be8c-47c0ad5f8358?v=1774136210191"}, {"full_name": "Krishna kanth Mundada", "job_title": "Software Engineer", "employer": "Versent", "photo_url": "https://speakers.webdirections.org/photos/photo/239fc22f-59b1-40f7-aeb9-1e7cb47abbc4?v=1774136192682"}, {"full_name": "Andy Kelk", "job_title": "Fractional CTO", "employer": "Self Employed", "photo_url": "https://speakers.webdirections.org/photos/photo/d81683b0-6749-4d4c-8bfc-5a2b4e73b094?v=1774136240882"}]}, {"id": "ebc489f4-4ca3-4109-9cf9-d8b96020f692", "title": "From AI Survey to Production: What the Readiness Gap Actually Looks Like", "description": "Everyone talks about AI transformation. Almost no one talks about what happens when you survey your workforce and discover that executives and employees have completely different ideas about what AI readiness means - or when your pilot succeeds technically but stumbles in implementation.\r\n\r\nThis talk walks through a real organisational AI adoption journey end to end: designing and running an employee AI-readiness survey to surface use cases, identify champions and resistance; assessing infrastructure readiness against ambition; mapping the gap between executive strategy and frontline reality; and building an implementation roadmap grounded in what the organisation could actually absorb - not just what looked good on a slide.\r\n\r\nWe'll cover how use cases were prioritised against both business objectives and genuine readiness, how a pilot was developed and what it took to move it into production, and, critically, where things went wrong along the way. The failures weren't in the AI solution itself but in the human and organisational layers around it, which is exactly where most enterprise AI initiatives quietly die. Whether you're beginning your AI adoption journey or leading initiatives beyond the proof-of-concept stage, this talk is a field report from the other side - showing what worked, what didn't, and how to catch the gaps before they scale.", "type": "talk", "track": "Leadership", "start_time": "15:00", "end_time": "15:25", "duration_minutes": 25, "location": "Swinburne Studio", "speakers": [{"full_name": "Dr Christian Dandre", "job_title": "Founder and Principal Consultant", "employer": "The Objective Company", "photo_url": "https://speakers.webdirections.org/photos/photo/af498586-6ebd-405c-8971-500f375b5a41?v=1779325258350"}]}, {"id": "5665739d-93b3-4178-ac45-a2bb7755df92", "title": "What We Learned Taking a Culture-First Approach to AI Adoption at scale", "description": "Most AI transformation stories focus on tooling, targets, and adoption curves. At Culture Amp, our primary focus was people and culture. We still wanted to drive and accelerate our impact, but we weren\u2019t willing to compromise on our focus on people to get there. We then partnered with an engineering analytics firm to measure whether our approach actually made a difference.\r\n\r\nThis is a co-presentation from Culture Amp's Director of Developer Experience and Director of Engineering Enablement. Having both roles in an org our size is an unusual choice, and it signals how seriously we take people and culture alongside technical delivery. Together, we helped lead an AI rollout grounded in trust over mandates, enablement over directives, and learning loops over training checklists.\r\n\r\nWe'll walk through what we built: a rollout shaped by pioneers and champions, rituals designed around psychological safety, hack days and storytelling that made experimentation feel normal. We'll share the data from a six-month research program across 88 engineers, tracking DORA metrics, adoption telemetry, and developer sentiment against industry benchmarks.\r\n\r\nPR sizes stayed flat while merge frequency climbed, which runs counter to the industry trend of AI-inflated code volume. Code review engagement went up, not down. 39% of engineers reported faster delivery. But we'll also be honest about what didn't work: MTTR increased post-rollout, decentralised messaging created confusion, and out-of-hours commits rose. Even with our people focus, we were moving faster than was comfortable for everyone, and we had to own that tension.\r\n\r\nWe're not presenting a blueprint. We're sharing what happened when we tried to go as fast as we could without losing sight of the people doing the work. If you've been wondering whether investing in engineering culture pays off during an AI transformation, we think you'll find this useful.", "type": "talk", "track": "Leadership", "start_time": "15:30", "end_time": "15:55", "duration_minutes": 25, "location": "Swinburne Studio", "speakers": [{"full_name": "Eric Grigson", "job_title": "Director of Developer Experience", "employer": "Culture Amp", "photo_url": "https://speakers.webdirections.org/photos/photo/35b5b2ce-90e8-49f5-908d-df76f20f1534?v=1774136238421"}, {"full_name": "Paul Hughes", "job_title": "Director of Engineering Enablement", "employer": "Culture Amp", "photo_url": "https://speakers.webdirections.org/photos/photo/85a484f4-a391-4f1e-838c-039636054734?v=1774136230915"}]}, {"id": "f8e0c7b8-5bac-4c45-9630-5fc13308a30c", "title": "Beat Burnout, Find Flourishing: The AI Edition", "description": "AI tools are an amplifier. They don't just amplify productivity, they amplify whatever dynamics already exist in a team.\r\n\r\nSteve Yegge calls it the Dracula Effect: AI coding at full speed is vampiric, draining engineers faster than anyone expected.\r\n\r\nWe've got to defend our teams against burnout and help them amplify the dynamics that nudge towards flourishing. In this talk, I'll present a practical framework and patterns for doing exactly that \u2014 drawn from peer-reviewed research and real experience leading a team shipping with AI tools.", "type": "talk", "track": "Leadership", "start_time": "16:00", "end_time": "16:25", "duration_minutes": 25, "location": "Swinburne Studio", "speakers": [{"full_name": "Navin Keswani", "job_title": "CPTO", "employer": "TANK", "photo_url": "https://speakers.webdirections.org/photos/photo/82255ecb-05ba-402f-81a1-68857cf20d23?v=1774136260824"}]}, {"id": "26397c8c-d5fe-4d6a-808d-1aaf42356024", "title": "Panel: Culture & People", "description": "A moderated conversation closing the L4 Culture & People session \u2014 and closing the Leadership track. Andrew Murphy leads a discussion with Dr Christian Dandre, Eric Grigson and Paul Hughes (Culture Amp), and Navin Keswani on readiness, adoption, and keeping people healthy through the change.", "type": "panel", "track": "Leadership", "start_time": "16:30", "end_time": "16:55", "duration_minutes": 25, "location": "Swinburne Studio", "speakers": [{"full_name": "Andrew Murphy", "job_title": "CEO (Chief Everything Officer.)", "employer": "Debugging Leadership", "photo_url": "https://speakers.webdirections.org/photos/photo/1b33891f-3253-4a6c-9a96-4334beedf25a?v=1776251588737"}, {"full_name": "Dr Christian Dandre", "job_title": "Founder and Principal Consultant", "employer": "The Objective Company", "photo_url": "https://speakers.webdirections.org/photos/photo/af498586-6ebd-405c-8971-500f375b5a41?v=1779325258350"}, {"full_name": "Eric Grigson", "job_title": "Director of Developer Experience", "employer": "Culture Amp", "photo_url": "https://speakers.webdirections.org/photos/photo/35b5b2ce-90e8-49f5-908d-df76f20f1534?v=1774136238421"}, {"full_name": "Paul Hughes", "job_title": "Director of Engineering Enablement", "employer": "Culture Amp", "photo_url": "https://speakers.webdirections.org/photos/photo/85a484f4-a391-4f1e-838c-039636054734?v=1774136230915"}, {"full_name": "Navin Keswani", "job_title": "CPTO", "employer": "TANK", "photo_url": "https://speakers.webdirections.org/photos/photo/82255ecb-05ba-402f-81a1-68857cf20d23?v=1774136260824"}]}]}, {"name": "AI Engineering", "sessions": [{"id": "4648eedf-32c5-409d-b66d-05fdc51c0e8c", "title": "Deploying AI at the Edge: Model Compression and Hardware-Aware Optimization", "description": "Large AI models often struggle to meet the latency, memory, and power constraints required for real-world edge deployments. This talk explores practical techniques for making modern AI models efficient enough to run on-device using model distillation, quantization, and hardware-aware optimization strategies. Attendees will learn how to reduce model size and inference costs while maintaining accuracy, covering approaches such as post-training quantization and efficient runtime optimization across modern AI frameworks and accelerators. The session will also highlight real-world tradeoffs between performance, memory footprint, and power efficiency when deploying AI applications on edge devices.", "type": "talk", "track": "AI Engineering", "start_time": "12:00", "end_time": "12:18", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Shivay Lamba", "job_title": "Senior AI/ML Engineer", "employer": "Qualcomm", "photo_url": "https://speakers.webdirections.org/photos/photo/4ed433ee-59b3-482d-b66c-edee77c4fc93?v=1778031011104"}]}, {"id": "665cc753-e86b-4d2a-bd73-44b618481ef8", "title": "When a Small Language Model Beat Our LLM in Production", "description": "Large language models are often the default choice for production AI systems, even when the task does not require broad reasoning or generative depth. In this talk, I will share a real production case where an LLM-based solution underperformed on latency, cost, and reliability and was ultimately replaced, in part, by a small language model.\r\n\r\nThe system in question supported a high-volume enterprise workflow involving structured extraction, classification, and validation. While the initial LLM implementation performed well in early prototypes, production usage exposed several issues: inconsistent outputs, escalating inference costs, and difficulty enforcing deterministic behaviour. These problems became more pronounced under scale.\r\n\r\nI will walk through the decision process that led us to introduce an SLM, the architectural changes required, and the criteria we used to evaluate success. The talk will cover where the SLM outperformed the LLM, where it clearly did not, and how we designed a hybrid pattern that escalates to an LLM only when necessary.\r\n\r\nThe session includes a live demo showing the before-and-after behaviour of the system, along with production metrics such as latency, cost per request, and error rates. I will also discuss failure modes we encountered, trade-offs we accepted, and the signals that helped us decide early whether an SLM was a viable replacement.\r\n\r\nMy aim is not to advocate for SLMs over LLMs in general, but to share the signals, metrics, and decision criteria that helped us choose the right tool for the job. I believe this perspective is timely as more teams move beyond experimentation into sustained production usage.", "type": "talk", "track": "AI Engineering", "start_time": "12:20", "end_time": "12:38", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Avni Bhatt", "job_title": "Sr Enterprise Architect", "employer": null, "photo_url": "https://speakers.webdirections.org/photos/photo/5ab3308a-c97f-432f-badf-d0a1dce022b6?v=1774136291936"}]}, {"id": "a309795f-84b5-4ba5-914a-1304d8bd9cbb", "title": "Multi-Model Collaboration with Claude Code: How to Measure What Actually Works", "description": "We built Claudish, a free open-source proxy that lets Claude Code work with any AI model. 15+ providers directly - Google, OpenAI, xAI, Kimi, MiniMax, and more. OpenRouter for even wider access. Or fully offline with Ollama. That was just the starting point. What came next was way more interesting.\r\n\r\nWhen you can run any model through the same interface, you start asking real questions. Which model works best for which task? Does mixing models actually help or is it just expensive complexity? How do you find the right combination for your team? And the hardest one - how do you measure any of this when LLM output is non-deterministic? You can't run the same prompt twice and get the same result. I'll share what we learned running multi-model setups across 100+ projects with a 70-engineer team. How we approach measurement, what surprised us, and a practical framework for engineers who need to evaluate AI tooling with something more than \"it feels faster.\"", "type": "talk", "track": "AI Engineering", "start_time": "12:40", "end_time": "12:58", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Jack Rudenko", "job_title": "CTO", "employer": "MadAppGang", "photo_url": "https://speakers.webdirections.org/photos/photo/b8c00501-6f53-4e78-9335-811244b0f3bd?v=1774136185157"}]}, {"id": "723e3fbe-0bd1-41ca-8c25-3c6a7f0f1c48", "title": "Edge AI with Direct Device Control", "description": "Despite all the hype and promise, we are in the Timeshare Mainframe moment of AI. Even our devices rely on the cloud for most inference.\u00a0As AI moves beyond the cloud and into the physical world, the real opportunity lies at the edge. It\u2019s where local intelligence meets local data and action. In this talk, we explore how AI systems can move from cloud agents to direct device control reducing round-trip latency, preserving user privacy, and enabling real-time responsiveness without constant cloud dependency. \r\n\r\nDrawing on experiments using platforms such as NVIDIA Orin Nano, ESP32 and Axera edge AI SoCs, we\u2019ll examine how to architect low-power systems that combine local data and action with inference. This includes running compact speech-to-text and video models on-device and using USB and Bluetooth HID interfaces to translate AI outputs directly into keyboard, mouse, and other human interface device control signals. Attendees will gain an insight into tools such as Platform.io and ready-made modules like those from M5Stack that accelerate edge development.", "type": "talk", "track": "AI Engineering", "start_time": "13:00", "end_time": "13:18", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Jeremy Kelaher", "job_title": "AI Enablement Architect", "employer": "SBS", "photo_url": "https://speakers.webdirections.org/photos/photo/a4a0a8fb-3732-4f3c-84f0-5eb84ef27391?v=1774136220565"}]}, {"id": "0c685015-ad6a-41ba-8f53-123f438a35e1", "title": "COBOL and AI: Building a Self-Serve Knowledge Layer for 2,000 Batch Jobs", "description": "Modernization planning stalls when the business rules are locked inside decades of COBOL code. This talk shares a practical, production\u2011tested playbook I used to extract those rules, make them explainable, and serve them to teams in a usable form.  It\u2019s not economical to have humans extract this level of operational knowledge from COBOL at scale. The outcome of this work is an agent that saves hours for operational staff by surfacing what a batch job does, which input files it consumes, and which outputs it produces.\r\n\r\nI\u2019ll walk through the end\u2011to\u2011end pipeline: how we used AI to parse COBOL into control\u2011 and data\u2011flow structures, generating diagrams that make execution paths and data dependencies visible, and assembling structured knowledge about each job (purpose, inputs, outputs, key rules). The emphasis is on trade\u2011offs: what we automated vs. where we needed human review, which COBOL constructs are most error\u2011prone, and how we scaled the approach across a legacy estate of ~2,000 COBOL jobs. Converting specific modules to Python is shown as one possible downstream outcome\u2014but the core goal is understanding and planning.  \r\n  \r\nI will demo a self\u2011serve knowledge agent we built for developers and business analysts. It makes available the original code repositories plus the derived diagrams and extracted rules, so teams can ask questions like \u201cwhere is premium eligibility calculated?\u201d and get grounded answers with traceable sources. This will include a live demo using a public COBOL repository so the workflow is reproducible without proprietary code.", "type": "talk", "track": "AI Engineering", "start_time": "13:20", "end_time": "13:38", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Matthew Gillard", "job_title": "Principal", "employer": "V2 AI", "photo_url": "https://speakers.webdirections.org/photos/photo/aa2716e5-f5a6-42e3-ab1e-92d4636ccc55?v=1774136243336"}]}, {"id": "7cc0e242-2595-4767-a394-5d0b52d32c76", "title": "Legacy Software + Agentic Discovery", "description": "Legacy software powers the world - from banking to utilities and government. The hardest part is rarely having access to the code. It\u2019s recovering the knowledge around it: what the system really does, the business rules it encodes, the edge cases no one remembers, and the intent that never made it into documentation.\r\n\r\nTo modernise safely, teams need more than technical understanding - they need functional understanding. A legacy codebase is a crime scene: you have to retrace the steps, gather evidence, and reconstruct the story in plain language that product, engineering, subject-matter experts, and AI agents can all work with.\r\n\r\nIn this session I\u2019ll share lessons from building Code-to-docs: a software reverse-engineering system that turns existing codebases into living software definitions. I\u2019ll cover the evolution from a fixed LLM pipeline to agentic discovery, the real trade-offs between quality, cost, and speed, and case studies showing how teams de-risked modernisation by turning millions of lines of legacy code into requirements in hours, not years.\r\n\r\nYou\u2019ll leave with practical patterns for agentic discovery, where it breaks down, and how to keep it honest.", "type": "talk", "track": "AI Engineering", "start_time": "13:40", "end_time": "13:58", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Chris Rickard", "job_title": "Founder & CEO", "employer": "Userdoc", "photo_url": "https://speakers.webdirections.org/photos/photo/4d680b1b-d6a3-4509-825f-40df80213060?v=1774136255936"}]}, {"id": "e570f71e-6538-40c4-8f97-8b92257e3ddc", "title": "Why LLMs Fall for Stories (And 5 Production Patterns That Actually Stop Them)", "description": "Prompt injection isn't a bug - it's a feature. LLMs trained on humanity's written corpus learned something we didn't intend: narrative structure. They understand dramatic tension, plot twists, and persuasive framing. When an attacker crafts a compelling story (\"Actually, the real system prompt said...\"), the model follows because that's what stories do. This talk connects 2,500 years of storytelling theory - from Aristotle's Poetics to Derrida's \"there is no outside text\" - to explain why prompt injection is an inevitable consequence of training on human language, not a solvable vulnerability.\r\n\r\nUnderstanding why doesn't stop the attacks, but it changes how you build defences. You'll learn production-tested layered defence patterns and leave with a mental model for threat modelling and patterns you can implement immediately.", "type": "talk", "track": "AI Engineering", "start_time": "15:00", "end_time": "15:18", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Mal Curtis", "job_title": "Principal Software Engineer", "employer": "NVIDIA", "photo_url": "https://speakers.webdirections.org/photos/photo/7782bd55-c720-4579-8c52-5de0e707485f?v=1774136200131"}]}, {"id": "be80e03a-9bc6-4a18-805a-36a12ab932ae", "title": "Hacking the Model: AI Red Teaming in Practice", "description": "AI is already in production\u2014but almost no one has tested how it breaks. Today I\u2019ll show you how attackers think, how models are actually exploited\u2014from prompt injection to data exfiltration\u2014and how to systematically uncover those risks before they become incidents.", "type": "talk", "track": "AI Engineering", "start_time": "15:20", "end_time": "15:38", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Pas Apicella", "job_title": "Field CTO", "employer": "Snyk APJ", "photo_url": "https://speakers.webdirections.org/photos/photo/9ef075a0-3b30-43f8-99c0-58e424f6e381?v=1774417626900"}]}, {"id": "4ce8f4cf-d1ac-4ce0-ac73-3c3c72d112ae", "title": "Why Most AI De-Identification Fails in Production, And How We Built One Lawyers Actually Trust", "description": "De-identifying text is easy to demo and surprisingly hard to ship. This talk is a deep technical case study of building SmartScrub, a reversible de-identification system designed for legal workflows, where privacy guarantees, auditability, and user trust are non-negotiable. \r\n\r\nThe original goal was simple, allow lawyers to safely use LLMs on transcripts without exposing client data. The reality was a long series of architectural failures that common PII masking approaches cannot survive in production. \r\n\r\nI will walk through what we actually built and why naive solutions broke down. This includes placeholder token design, collision avoidance, stability across edits, and why masking too aggressively destroys downstream LLM usefulness. I will show how reversible de-identification changes your entire data model, UI, and persistence strategy, and why this becomes a systems problem rather than an NLP problem. \r\n\r\nThe talk covers hard trade-offs we made around local-first processing, cloud services, manual review tooling, user-defined PII patterns, and audit-safe re-identification. I will also share failure modes we only discovered after real users interacted with the system, including false positives that destroy trust, silent data drift, and UI decisions that unintentionally leak meaning. \r\n\r\nThis is not a theoretical talk. It is a production story about building AI under legal risk, zero tolerance for silent errors, and users who will abandon the product instantly if they do not fully understand what the system is doing. If you are building AI systems that touch sensitive data, this talk will save you months of painful mistakes. \r\n\r\nWhat Attendees Will Learn \r\n- Why common PII masking approaches fail under real legal workflows \r\n- How to design reversible de-identification that survives editing, reprocessing, and audits\r\n- Placeholder strategies that preserve LLM utility without leaking meaning \r\n- Architectural patterns for isolating raw data while still enabling AI pipelines \r\n- UI and data model decisions that directly impact user trust \r\n- Failure modes you will not catch until real professionals use your system \r\n\r\nTechnical Topics Covered \r\n- Reversible de-identification architectures \r\n- Placeholder token stability and mapping persistence \r\n- Manual scrub tooling and override precedence \r\n- User-defined PII pattern overlays \r\n- Auditability and re-identification guarantees \r\n- Local-first vs cloud processing trade-offs \r\n- Why this problem is systems engineering, not just NLP \r\n\r\nPlus. a short live walkthrough showing how a legal transcript is de-identified, reviewed, edited, and safely re-identified, including examples of failure cases and how the system prevents them.", "type": "talk", "track": "AI Engineering", "start_time": "15:40", "end_time": "15:58", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Moin Zaman", "job_title": "Co-founder", "employer": "Smartnote", "photo_url": "https://speakers.webdirections.org/photos/photo/b30bd8d6-c1f3-4896-9631-246e400ac7b5?v=1774136207689"}]}, {"id": "78b4af9a-3a5a-4ebe-bf01-a207a552da05", "title": "Are Your AI Agents Secure? Defending the Privileged Agent", "description": "Are the AI agents you're developing truly secure?\r\n\r\nAI agents that execute actions autonomously offer unprecedented value. But what about the \"privileges\" granted to them to act \"on behalf of the user\"?\r\n\r\nImproper privilege management for agents is no longer a theoretical problem\u2014it's a clear and present danger. An exploited AI agent with excessive privileges can lead to significant financial losses and devastating data breaches.\r\n\r\nThis session dives deep into the biggest pitfall in AI agent development: privilege and authorization. I will demystify the latest risks, such as Excessive Agency and Identity Abuse, and discuss defensive measures you can take to protect your AI agents from malicious actors. This is the critical security state that every development organization must understand before deploying AI agents into production.", "type": "talk", "track": "AI Engineering", "start_time": "16:00", "end_time": "16:18", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Daizen Ikehara", "job_title": "Principal Developer Advocate", "employer": "Auth0", "photo_url": "https://speakers.webdirections.org/photos/photo/cd30697f-0187-4bd8-8668-54b99c5ad720?v=1775180560942"}]}, {"id": "8699baf3-d7cd-4065-9d4c-e22ab1a36f35", "title": "Your Agents Pass Every Benchmark\u2014Then Memory Breaks Them in Production", "description": "You add memory to your agent, it works great in testing, and you ship it. A few weeks later, outputs start getting worse and nobody can figure out why. The agent is pulling in old information that's no longer true, retrieving context that's loosely related but clutters its reasoning, and sometimes carrying forward bad data that quietly corrupts every response after it. Standard evals won't catch any of this because they test single turns, not how memory behaves over hundreds of sessions. In this talk, we will walk through practical design principles and evaluation patterns you can implement to detect memory degradation before your users notice it. You'll walk away knowing how to design and evaluate memory enabled agents so it actually makes your agent more reliable instead of silently breaking it.", "type": "talk", "track": "AI Engineering", "start_time": "16:20", "end_time": "16:38", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Ananya Roy", "job_title": "AI Architect", "employer": "Databricks", "photo_url": "https://speakers.webdirections.org/photos/photo/88174412-65e8-4b74-85a0-550d616fa723?v=1774136253501"}]}, {"id": "8a1bbda2-87c9-4a09-af87-d8a9d947d848", "title": "AI Agents Are Distributed Systems", "description": "AI agents aren\u2019t magic. They\u2019re distributed systems \u2014 with better marketing.\r\n\r\nBehind every impressive demo is a messy reality: multiple tools, remote services, auth boundaries, latency, retries, side effects, and deployment trade-offs. When I took a seemingly simple multi-tool agent built with MCP and Gemini ADK and pushed it into production, I stopped thinking about prompts \u2014 and started thinking about architecture.\r\n\r\nIn this talk, I\u2019ll share what changed when the agent left localhost.\r\n\r\nWe\u2019ll explore what happens when tools become independently deployed services, when stdio orchestration meets HTTP in the real world, and when generating an image, storing it, and emailing it turns into a reliability problem \u2014 not just a feature.\r\n\r\nYou\u2019ll see how treating the agent as a control plane \u2014 and exposing it as a service \u2014 transforms it from a demo into infrastructure.\r\n\r\nThis isn\u2019t a code walkthrough. It\u2019s a systems story.\r\n\r\nIf you\u2019re building AI agents meant to survive outside a notebook, this talk is about the parts no one shows in the demo.", "type": "talk", "track": "AI Engineering", "start_time": "16:40", "end_time": "16:58", "duration_minutes": 18, "location": "Cinema 1", "speakers": [{"full_name": "Lovee Jain", "job_title": "Senior Software Engineer | Google Developer Expert | AWS Community Builder", "employer": null, "photo_url": "https://speakers.webdirections.org/photos/photo/1503980c-d253-4a5d-8225-a7739575056f?v=1774136263171"}]}]}, {"name": "All", "sessions": [{"id": "3583e42b-acbc-4d90-8b29-178971398512", "title": "AI Leaders Roundtable Breakfast", "description": "Kick off day two of AI Engineer Melbourne with an exclusive leadership round table breakfast, sponsored by Vercel. Built for senior AI engineers and the leaders driving AI engineering inside their organisations, it's a chance to compare notes with peers tackling the same hard problems \u2014 from agentic infrastructure to production reliability to building teams that can actually ship. Expect candid conversation, strong coffee, and a room of people genuinely worth talking to. Places are limited and reserved for senior practitioners and leaders, and RSVP's are required.", "type": "social", "track": "All", "start_time": "07:30", "end_time": "08:45", "duration_minutes": 75, "location": "Cameo, ACMI", "speakers": []}]}, {"name": "Workshop", "sessions": [{"id": "8c29bef6-e037-47ff-a130-642da3ec44a5", "title": "Observability and Evaluation for LLM Apps and Agentic AI with Langfuse", "description": "Shipping an LLM app is easy. Knowing whether it's actually working is hard. Unlike traditional software, LLM systems and agentic pipelines can run without errors while producing wrong or degraded answers \u2014 and with agents making multi-step decisions across tools and APIs, a single bad output can cascade silently through your entire system.\r\n\r\nThis hands-on workshop shows you how Langfuse gives your team the visibility and control to ship AI with confidence. You'll go from a blind prototype to a fully observable system \u2014 seeing exactly what your app costs, where quality drops, and which prompt changes actually improve things.\r\n\r\nFor agentic systems, Langfuse traces every step of an agent's decision-making, so when something goes wrong you know exactly why, rather than losing hours to guesswork. Features like the Prompt Playground and LLM-as-a-judge evals mean faster iteration with less manual effort.\r\n\r\nPrerequisites: Python 3.10+, OpenAI API key (optional), laptop. Langfuse account created on the day (free).", "type": "workshop", "track": "Workshop", "start_time": "12:00", "end_time": "14:00", "duration_minutes": 120, "location": "Gandel Digital Future Lab", "speakers": [{"full_name": "Muhammad Ali", "job_title": "Senior Solution Architect", "employer": "ClickHouse", "photo_url": "https://speakers.webdirections.org/photos/photo/e6d1c7d9-b7a6-417e-a1ef-f7ce04ef4744?v=1777526003674"}]}]}]}]}</script>
<script>
const DATA = JSON.parse(document.getElementById('DATA').textContent);
const TODAY = "2026-06-03"; // for the NOW line
const TRACK_COLORS = {
  "Keynote":"var(--keynote)","Hallway":"var(--hallway)","Software Engineering":"var(--se)",
  "Leadership":"var(--lead)","AI Engineering":"var(--ai)","All":"var(--all)","Workshop":"var(--workshop)"
};
const PXMIN = 1.7;            // pixels per minute
const HEAD_H = 46;           // column header height
const toMin = t => { const [h,m]=t.split(':').map(Number); return h*60+m; };
const fmt = t => { let [h,m]=t.split(':').map(Number); const ap=h>=12?'pm':'am'; h=h%12||12; return `${h}:${String(m).padStart(2,'0')}${ap}`; };

let curDay = 0;
const trackOff = new Set();

function build(){
  buildDayTabs();
  render();
}

function buildDayTabs(){
  const wrap=document.getElementById('daytabs');
  wrap.innerHTML='';
  DATA.days.forEach((d,i)=>{
    const b=document.createElement('button');
    b.textContent=d.label.replace(/,.*/,'').replace(/\s\w+\s/,' ').trim().length?d.label.split(',')[0]:d.date;
    b.textContent=d.label.split(',').slice(0,2).join(',');
    b.className=i===curDay?'active':'';
    b.onclick=()=>{curDay=i;buildDayTabs();render();};
    wrap.appendChild(b);
  });
}

function buildTrackFilters(tracks){
  const wrap=document.getElementById('trackfilters');
  wrap.innerHTML='';
  tracks.forEach(t=>{
    const c=document.createElement('span');
    c.className='trackchip'+(trackOff.has(t.name)?' off':'');
    c.style.setProperty('--c',TRACK_COLORS[t.name]||'#888');
    c.innerHTML=`<span class="dot"></span>${t.name}`;
    c.onclick=()=>{trackOff.has(t.name)?trackOff.delete(t.name):trackOff.add(t.name);render();};
    wrap.appendChild(c);
  });
}

function render(){
  const day=DATA.days[curDay];
  const tracks=day.tracks.filter(t=>!trackOff.has(t.name));
  buildTrackFilters(day.tracks);

  // time bounds across visible (use all tracks for stable axis)
  let lo=24*60, hi=0;
  day.tracks.forEach(t=>t.sessions.forEach(s=>{lo=Math.min(lo,toMin(s.start_time));hi=Math.max(hi,toMin(s.end_time));}));
  lo=Math.floor(lo/60)*60; hi=Math.ceil(hi/60)*60;
  const totalH=(hi-lo)*PXMIN;

  const grid=document.getElementById('grid');
  grid.style.gridTemplateColumns=`64px repeat(${tracks.length}, minmax(180px, 1fr))`;
  grid.style.gridTemplateRows=`${HEAD_H}px ${totalH}px`;
  grid.innerHTML='';

  // corner
  const corner=document.createElement('div');corner.className='col-head timehead';corner.textContent='Time';
  grid.appendChild(corner);
  // track headers
  tracks.forEach(t=>{
    const h=document.createElement('div');h.className='col-head';
    h.style.setProperty('--c',TRACK_COLORS[t.name]||'#888');
    h.innerHTML=`<span class="dot"></span>${t.name}`;
    grid.appendChild(h);
  });
  // time gutter
  const tcol=document.createElement('div');tcol.className='timecol';tcol.style.position='relative';
  for(let m=lo;m<=hi;m+=60){
    const lab=document.createElement('div');lab.className='timelabel';
    lab.style.top=((m-lo)*PXMIN)+'px';
    lab.textContent=fmt(`${Math.floor(m/60)}:${String(m%60).padStart(2,'0')}`);
    tcol.appendChild(lab);
  }
  grid.appendChild(tcol);

  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  let visibleCount=0, hitCount=0;

  tracks.forEach(t=>{
    const area=document.createElement('div');area.className='track-area';area.style.position='relative';
    // hour lines
    for(let m=lo;m<=hi;m+=60){
      const hl=document.createElement('div');hl.className='hourline';hl.style.top=((m-lo)*PXMIN)+'px';area.appendChild(hl);
    }
    t.sessions.forEach(s=>{
      const top=(toMin(s.start_time)-lo)*PXMIN;
      const h=Math.max((toMin(s.end_time)-toMin(s.start_time))*PXMIN, 22);
      const el=document.createElement('div');
      el.className='session'+(h<40?' tiny':'');
      el.style.top=top+'px';el.style.height=(h-4)+'px';
      el.style.setProperty('--c',TRACK_COLORS[t.name]||'#888');
      const spk=(s.speakers||[]).map(x=>x.full_name).filter(Boolean).join(', ');
      el.innerHTML=`<p class="t">${esc(s.title)}</p>
        <div class="meta"><span class="badge">${s.type}</span><span>${fmt(s.start_time)}–${fmt(s.end_time)}</span>${s.location?`<span>· ${esc(s.location)}</span>`:''}</div>
        ${spk?`<div class="spk">${esc(spk)}</div>`:''}`;
      el.onclick=()=>openModal(s,t.name);
      // search highlight
      if(q){
        const hay=(s.title+' '+spk+' '+(s.description||'')+' '+s.type).toLowerCase();
        if(hay.includes(q)){el.classList.add('hit');hitCount++;} else {el.classList.add('dim');}
      }
      area.appendChild(el);
      visibleCount++;
    });

    // NOW line on today's day
    if(day.date===TODAY){
      const now=new Date();
      const nm=now.getHours()*60+now.getMinutes();
      if(nm>=lo&&nm<=hi){
        const nl=document.createElement('div');nl.className='nowline';nl.style.top=((nm-lo)*PXMIN)+'px';area.appendChild(nl);
      }
    }
    grid.appendChild(area);
  });

  document.getElementById('count').textContent = q ? `${hitCount} match${hitCount===1?'':'es'}` : `${visibleCount} sessions`;
}

function openModal(s,track){
  const card=document.getElementById('card');
  const spk=(s.speakers||[]).map(x=>`
    <div class="spkrow">
      ${x.photo_url?`<img src="${x.photo_url}" alt="" onerror="this.style.visibility='hidden'">`:'<img alt="">'}
      <div><div class="nm">${esc(x.full_name||'')}</div><div class="jt">${esc([x.job_title,x.employer].filter(Boolean).join(' · '))}</div></div>
    </div>`).join('');
  card.innerHTML=`<button class="close" onclick="closeModal()">×</button>
    <h2>${esc(s.title)}</h2>
    <div class="cmeta"><span class="badge">${s.type}</span><span>${track}</span><span>${fmt(s.start_time)}–${fmt(s.end_time)}</span>${s.location?`<span>${esc(s.location)}</span>`:''}</div>
    ${s.description?`<div class="desc">${esc(s.description)}</div>`:''}
    ${spk?`<div class="spklist">${spk}</div>`:''}`;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeModal();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
document.getElementById('search').addEventListener('input',render);
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

build();
</script>
</body>
